cache:
  discovery_ttl_seconds: 3600
  market_ttl_seconds: 60
  news_ttl_seconds: 900
discovery:
  auto_track: true
  baseline_window_hours: 168
  enabled: true
  min_mentions: 3
  rising_multiplier: 3.0
schedule:
