cache:
  discovery_ttl_seconds: 3600
  market_ttl_seconds: 60
  news_ttl_seconds: 900
discovery:
  auto_track: true
  baseline_window_hours: 168
  enabled: true
  min_mentions: 3
  rising_multiplier: 3.0
schedule:
  background_enabled: false
  background_interval_minutes: 30
scoring:
  retain_high_scores: true
  retention_threshold: 8.0
  retention_max_age_hours: 24
  retention_max_items: 20
  critical_min: 9.0
  filter_below: 5.0
  forbidden_score: 5.0
  high_min: 7.0
  inference_model: qwen3:30b-a3b
  wizard_model: qwen3:14b
  medium_min: 5.0
  model: stratos-scorer-v2
  ollama_host: http://localhost:11434
  timeout:
    rolling_window: 20
    seed_avg: 10
    fast_buffer: 30
    fast_minimum: 45
    slow_multiplier: 3
    slow_buffer: 60
    avg_cap: 60
  fallback_score: 3.0
search:
  google_api_key: ${GOOGLE_API_KEY}
  google_cx: ${GOOGLE_CSE_ID}
  provider: serper
  serper_api_key: ${SERPER_API_KEY}
  serper_credits: 0
system:
  database_file: strat_os.db
  frontend_port: 8080
  log_level: INFO
  max_news_items: 100
  output_file: output/news_data.json
email:
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_user: ${SMTP_USER}
  smtp_password: ${SMTP_PASSWORD}
profile:
  role: Game Developer
  location: Kuwait
  context: Game Developer in Kuwait focused on learning and development in game development,
    tracking industry trends, tools, and employment opportunities.
  interests: []
market:
  tickers:
  - symbol: CL=F
    name: Crude Oil
  - symbol: GC=F
    name: Gold
  - symbol: XOM
    name: ExxonMobil
  - symbol: CVX
    name: Chevron
  - symbol: SLB
    name: SLB
news:
  timelimit: w
  career:
    root: kuwait
    keywords: []
    queries: []
  finance:
    root: kuwait
    keywords: []
    queries: []
  tech_trends:
    root: global
    keywords: []
    queries: []
  regional:
    root: regional
    keywords: []
    queries: []
dynamic_categories:
- id: gamedev
  label: Game Development Employers
  icon: briefcase
  items:
  - Ubisoft Kuwait
  - EA Sports
  - Activision Blizzard
  - Nexon
  - Zynga
  - Kuwait Game Studio
  - Gameloft
  - Nintendo Kuwait
  enabled: true
  scorer_type: career
  root: kuwait
- id: gametech
  label: Game Tech & Tools
  icon: cpu
  items:
  - Unity Engine
  - Unreal Engine
  - Godot
  - VR development
  - AI in games
  - GameFi
  - Cloud gaming
  - Blockchain gaming
  enabled: true
  scorer_type: tech
  root: global
- id: learn
  label: Learning & Certifications
  icon: book-open
  items:
  - Unity Certified
  - Unreal Engine certification
  - GameDev courses
  - Coursera game dev
  - Udemy game dev
  - GDC workshops
  - Game jams Kuwait
  - Game design bootcamps
  enabled: false
  scorer_type: career
  root: kuwait
- id: gamenews
  label: Regional & Global Industry News
  icon: globe
  items:
  - GDC Kuwait
  - gamescom
  - Kuwait gaming events
  - Middle East game dev
  - Global game trends
  - Steam updates
  - Indie game funding
  - ESports Kuwait
  enabled: false
  scorer_type: regional
  root: regional
- id: trends
  label: Game Development Trends
  icon: target
  items:
  - Metaverse gaming
  - AI NPCs
  - 5G gaming
  - VR/AR integration
  - Cross-platform dev
  - Game analytics
  - Sustainability in games
  enabled: false
  scorer_type: tech
  root: global
