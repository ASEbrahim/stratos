  market_ttl_seconds: 60
  news_ttl_seconds: 900
discovery:
  auto_track: true
  baseline_window_hours: 168
  enabled: true
  min_mentions: 3
  rising_multiplier: 3.0
schedule:
  background_enabled: false
  background_interval_minutes: 30
scoring:
  retain_high_scores: false
  retention_threshold: 8.0
  retention_max_age_hours: 24
  retention_max_items: 20
  critical_min: 9.0
  filter_below: 5.0
  forbidden_score: 5.0
  high_min: 7.0
  inference_model: qwen3.5:9b
  wizard_model: qwen3.5:9b
  medium_min: 5.0
  model: stratos-scorer-v2.2
  ollama_host: http://localhost:11434
