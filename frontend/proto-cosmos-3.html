<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos Prototype 3 - Tilted Perspective Solar System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #05070c;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
.overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
}
.overlay h1 {
    color: rgba(232, 185, 49, 0.12);
    font-size: 4rem;
    font-weight: 200;
    letter-spacing: 0.3em;
    text-transform: uppercase;
}
.info {
    position: fixed; bottom: 20px; left: 20px; color: #7a8bb5;
    font-size: 12px; z-index: 10; opacity: 0.6;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay"><h1>StratOS</h1></div>
<div class="info">Prototype 3: Tilted perspective (like the reference image), nebula glow, depth-sorted</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', () => {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    resize();
});

const W = () => window.innerWidth;
const H = () => window.innerHeight;

let mouseX = W() / 2, mouseY = H() / 2;
let smoothMX = W() / 2, smoothMY = H() / 2;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

// Elliptical tilt - this creates the angled perspective like the reference image
const TILT = 0.38; // Y-scale for orbits (0 = edge-on, 1 = top-down)
const ROTATION = -0.15; // Slight rotation of the orbital plane

// Stars
const STAR_COUNT = 350;
const stars = [];
for (let i = 0; i < STAR_COUNT; i++) {
    const isBright = Math.random() < 0.08;
    const isGold = Math.random() < 0.12;
    const isBlue = Math.random() < 0.15;
    let color;
    if (isGold) color = { r: 232, g: 200, b: 120 };
    else if (isBlue) color = { r: 140, g: 170, b: 255 };
    else color = { r: 200, g: 210, b: 230 };
    stars.push({
        x: Math.random(), y: Math.random(),
        r: isBright ? Math.random() * 1.8 + 0.8 : Math.random() * 1.0 + 0.2,
        a: isBright ? Math.random() * 0.5 + 0.3 : Math.random() * 0.25 + 0.05,
        twinkle: Math.random() * 2.5 + 0.5,
        phase: Math.random() * Math.PI * 2,
        color,
        isBright
    });
}

// Solar system
const planets = [
    { name: 'Mercury', dist: 48,  r: 2,   color: [176, 160, 144], speed: 4.2,  phase: Math.random() * Math.PI * 2 },
    { name: 'Venus',   dist: 72,  r: 3.5, color: [232, 199, 122], speed: 1.65, phase: Math.random() * Math.PI * 2 },
    { name: 'Earth',   dist: 100, r: 3.5, color: [70, 140, 210],  speed: 1.0,  phase: Math.random() * Math.PI * 2, moon: { dist: 10, r: 1, speed: 5 } },
    { name: 'Mars',    dist: 132, r: 2.8, color: [210, 100, 60],  speed: 0.53, phase: Math.random() * Math.PI * 2 },
    { name: 'Jupiter', dist: 190, r: 7.5, color: [210, 165, 90],  speed: 0.084,phase: Math.random() * Math.PI * 2 },
    { name: 'Saturn',  dist: 248, r: 6,   color: [195, 178, 115], speed: 0.034,phase: Math.random() * Math.PI * 2, rings: true },
    { name: 'Uranus',  dist: 310, r: 4.2, color: [120, 195, 195], speed: 0.012,phase: Math.random() * Math.PI * 2 },
    { name: 'Neptune', dist: 370, r: 4,   color: [65, 100, 210],  speed: 0.006,phase: Math.random() * Math.PI * 2 },
];

// Asteroid belt
const asteroids = [];
for (let i = 0; i < 100; i++) {
    asteroids.push({
        dist: 155 + Math.random() * 25,
        angle: Math.random() * Math.PI * 2,
        speed: 0.12 + Math.random() * 0.1,
        r: Math.random() * 0.7 + 0.2,
        a: Math.random() * 0.3 + 0.05,
        yOffset: (Math.random() - 0.5) * 4 // slight vertical scatter
    });
}

// Helper: project 3D orbit position to 2D with tilt
function projectOrbit(cx, cy, dist, angle) {
    const x3d = Math.cos(angle) * dist;
    const y3d = Math.sin(angle) * dist;
    // Apply tilt
    const cosR = Math.cos(ROTATION), sinR = Math.sin(ROTATION);
    const rx = x3d * cosR - y3d * sinR;
    const ry = (x3d * sinR + y3d * cosR) * TILT;
    return { x: cx + rx, y: cy + ry, depth: Math.sin(angle) }; // depth for z-sorting
}

// Draw tilted orbit ellipse
function drawTiltedOrbit(cx, cy, dist, alpha) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(ROTATION);
    ctx.scale(1, TILT);
    ctx.beginPath();
    ctx.arc(0, 0, dist, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(120, 150, 210, ${alpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
}

// Shooting stars
const shooters = [];
let lastShoot = 0;

function draw(time) {
    const t = time * 0.001;
    const w = W(), h = H();
    ctx.clearRect(0, 0, w, h);

    // Smooth mouse parallax
    smoothMX += (mouseX - smoothMX) * 0.03;
    smoothMY += (mouseY - smoothMY) * 0.03;
    const mx = (smoothMX / w - 0.5) * 2;
    const my = (smoothMY / h - 0.5) * 2;

    const cx = w * 0.5 + mx * 15;
    const cy = h * 0.5 + my * 15;

    // Background gradient - warm center like the reference
    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.75);
    bg.addColorStop(0, '#111a2e');
    bg.addColorStop(0.25, '#0c1222');
    bg.addColorStop(0.55, '#070c18');
    bg.addColorStop(1, '#030508');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // Subtle nebula glow near sun
    const neb1 = ctx.createRadialGradient(cx - 30, cy + 20, 0, cx, cy, 200);
    neb1.addColorStop(0, 'rgba(232, 185, 49, 0.03)');
    neb1.addColorStop(0.5, 'rgba(180, 150, 80, 0.01)');
    neb1.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = neb1;
    ctx.fillRect(0, 0, w, h);

    // Stars
    for (const s of stars) {
        const tw = 0.55 + 0.45 * Math.sin(t * s.twinkle + s.phase);
        const sx = s.x * w + mx * (s.isBright ? 8 : 3);
        const sy = s.y * h + my * (s.isBright ? 8 : 3);
        const alpha = s.a * tw;

        ctx.beginPath();
        ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${s.color.r}, ${s.color.g}, ${s.color.b}, ${alpha})`;
        ctx.fill();

        // Star glow for bright ones
        if (s.isBright && tw > 0.75) {
            const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, s.r * 4);
            sg.addColorStop(0, `rgba(${s.color.r}, ${s.color.g}, ${s.color.b}, ${alpha * 0.3})`);
            sg.addColorStop(1, `rgba(${s.color.r}, ${s.color.g}, ${s.color.b}, 0)`);
            ctx.fillStyle = sg;
            ctx.beginPath();
            ctx.arc(sx, sy, s.r * 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Shooting stars
    if (t - lastShoot > 7 + Math.random() * 6) {
        const angle = Math.random() * 0.6 + 0.2;
        const sp = 5 + Math.random() * 5;
        shooters.push({
            x: Math.random() * w * 0.65, y: Math.random() * h * 0.3,
            vx: Math.cos(angle) * sp, vy: Math.sin(angle) * sp,
            life: 1, len: 35 + Math.random() * 35
        });
        lastShoot = t;
    }
    for (let i = shooters.length - 1; i >= 0; i--) {
        const s = shooters[i];
        s.x += s.vx; s.y += s.vy; s.life -= 0.01;
        if (s.life <= 0) { shooters.splice(i, 1); continue; }
        const tx = s.x - s.vx * s.len * 0.12;
        const ty = s.y - s.vy * s.len * 0.12;
        const g = ctx.createLinearGradient(tx, ty, s.x, s.y);
        g.addColorStop(0, `rgba(255, 240, 200, 0)`);
        g.addColorStop(1, `rgba(255, 240, 200, ${s.life * 0.5})`);
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = g; ctx.lineWidth = 1.2; ctx.stroke();
    }

    // === SOLAR SYSTEM (tilted perspective) ===

    // Orbit lines (behind everything)
    for (const p of planets) {
        drawTiltedOrbit(cx, cy, p.dist, 0.07);
    }
    // Asteroid belt orbit hint
    drawTiltedOrbit(cx, cy, 155, 0.03);
    drawTiltedOrbit(cx, cy, 180, 0.03);

    // Collect all renderable objects with depth for z-sorting
    const renderables = [];

    // Asteroids
    for (const a of asteroids) {
        const angle = a.angle + t * a.speed;
        const proj = projectOrbit(cx, cy, a.dist, angle);
        renderables.push({
            type: 'asteroid',
            x: proj.x, y: proj.y + a.yOffset,
            depth: proj.depth,
            r: a.r, a: a.a
        });
    }

    // Planets
    for (let i = 0; i < planets.length; i++) {
        const p = planets[i];
        const angle = p.phase + t * p.speed * 0.15;
        const proj = projectOrbit(cx, cy, p.dist, angle);
        renderables.push({
            type: 'planet',
            planet: p,
            x: proj.x, y: proj.y,
            depth: proj.depth,
            angle
        });
        // Moon
        if (p.moon) {
            const mAngle = angle + t * p.moon.speed * 0.3;
            const mProj = projectOrbit(proj.x, proj.y, p.moon.dist, mAngle);
            renderables.push({
                type: 'moon',
                x: mProj.x, y: mProj.y,
                depth: proj.depth + mProj.depth * 0.01,
                r: p.moon.r
            });
        }
    }

    // Sun always rendered, but add to list for sorting
    renderables.push({ type: 'sun', x: cx, y: cy, depth: 0 });

    // Sort by depth (back to front)
    renderables.sort((a, b) => a.depth - b.depth);

    // Render
    for (const obj of renderables) {
        if (obj.type === 'asteroid') {
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(150, 140, 120, ${obj.a})`;
            ctx.fill();
        }
        else if (obj.type === 'sun') {
            drawSun(cx, cy, t);
        }
        else if (obj.type === 'moon') {
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(200, 200, 210, 0.7)';
            ctx.fill();
        }
        else if (obj.type === 'planet') {
            drawPlanet(obj.x, obj.y, obj.planet, obj.depth);
        }
    }

    requestAnimationFrame(draw);
}

function drawSun(cx, cy, t) {
    const pulse = 1 + Math.sin(t * 0.5) * 0.05;
    const r = 20 * pulse;

    // Far glow
    const g4 = ctx.createRadialGradient(cx, cy, r, cx, cy, r * 10);
    g4.addColorStop(0, 'rgba(232, 185, 49, 0.08)');
    g4.addColorStop(0.4, 'rgba(232, 185, 49, 0.02)');
    g4.addColorStop(1, 'rgba(232, 185, 49, 0)');
    ctx.fillStyle = g4;
    ctx.beginPath(); ctx.arc(cx, cy, r * 10, 0, Math.PI * 2); ctx.fill();

    // Corona
    const g3 = ctx.createRadialGradient(cx, cy, r * 0.8, cx, cy, r * 3.5);
    g3.addColorStop(0, 'rgba(255, 220, 100, 0.35)');
    g3.addColorStop(0.5, 'rgba(232, 185, 49, 0.1)');
    g3.addColorStop(1, 'rgba(232, 185, 49, 0)');
    ctx.fillStyle = g3;
    ctx.beginPath(); ctx.arc(cx, cy, r * 3.5, 0, Math.PI * 2); ctx.fill();

    // Inner glow
    const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.5);
    g2.addColorStop(0, 'rgba(255, 245, 220, 0.6)');
    g2.addColorStop(1, 'rgba(232, 185, 49, 0)');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(cx, cy, r * 1.5, 0, Math.PI * 2); ctx.fill();

    // Core
    const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g1.addColorStop(0, '#fff8e0');
    g1.addColorStop(0.2, '#ffe566');
    g1.addColorStop(0.5, '#f0c030');
    g1.addColorStop(0.8, '#e8b931');
    g1.addColorStop(1, '#c08520');
    ctx.fillStyle = g1;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

    // Hot spots (surface detail)
    for (let i = 0; i < 3; i++) {
        const a = t * 0.3 + i * 2.1;
        const hx = cx + Math.cos(a) * r * 0.4;
        const hy = cy + Math.sin(a) * r * 0.4;
        const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, r * 0.3);
        hg.addColorStop(0, 'rgba(255, 255, 230, 0.3)');
        hg.addColorStop(1, 'rgba(255, 255, 230, 0)');
        ctx.fillStyle = hg;
        ctx.beginPath(); ctx.arc(hx, hy, r * 0.3, 0, Math.PI * 2); ctx.fill();
    }
}

function drawPlanet(px, py, planet, depth) {
    const c = planet.color;
    // Size modulation based on depth (closer = slightly larger)
    const depthScale = 1 + depth * 0.08;
    const r = planet.r * depthScale;

    // Glow
    const glow = ctx.createRadialGradient(px, py, 0, px, py, r * 4);
    glow.addColorStop(0, `rgba(${c[0]}, ${c[1]}, ${c[2]}, 0.18)`);
    glow.addColorStop(1, `rgba(${c[0]}, ${c[1]}, ${c[2]}, 0)`);
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(px, py, r * 4, 0, Math.PI * 2); ctx.fill();

    // Shadow side (sun is at center, so shadow opposite to sun direction)
    // Light comes from center of screen toward planet
    const bodyG = ctx.createRadialGradient(px - r * 0.35, py - r * 0.35, 0, px + r * 0.2, py + r * 0.2, r * 1.2);
    bodyG.addColorStop(0, `rgba(${Math.min(255, c[0] + 50)}, ${Math.min(255, c[1] + 50)}, ${Math.min(255, c[2] + 50)}, 1)`);
    bodyG.addColorStop(0.6, `rgba(${c[0]}, ${c[1]}, ${c[2]}, 1)`);
    bodyG.addColorStop(1, `rgba(${Math.max(0, c[0] - 40)}, ${Math.max(0, c[1] - 40)}, ${Math.max(0, c[2] - 40)}, 1)`);
    ctx.fillStyle = bodyG;
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();

    // Saturn rings
    if (planet.rings) {
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(ROTATION * 0.5);
        ctx.scale(1, 0.28);

        // Ring gradient
        for (let ri = 0; ri < 3; ri++) {
            const ringR = r * (1.8 + ri * 0.35);
            const ringA = [0.4, 0.25, 0.12][ri];
            const ringW = [2.5, 2, 1.2][ri];
            ctx.beginPath();
            ctx.arc(0, 0, ringR, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${ringA})`;
            ctx.lineWidth = ringW;
            ctx.stroke();
        }
        ctx.restore();
    }
}

requestAnimationFrame(draw);
</script>
</body>
</html>
