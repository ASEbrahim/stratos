<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Black Hole — P3: Neutron Star Pulsar</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#06040e; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

// Neutron star / pulsar: ultra-dense rapidly spinning star
// with magnetic field lines and twin radiation jets

const STAR_R = 18; // tiny but dense
const SPIN_SPEED = 0.8; // fast rotation
const JET_LENGTH = 450;

// Surface hotspots (magnetic poles emit beams)
const BEAM_WIDTH = 0.12; // radians — narrow beam

// Magnetosphere field line particles
const FIELD_COUNT = 300;
const fieldParticles = [];
for (let i = 0; i < FIELD_COUNT; i++) {
    const fieldLine = Math.floor(Math.random() * 8); // 8 field lines
    const along = Math.random(); // position along field line 0-1
    fieldParticles.push({
        fieldLine,
        along,
        speed: 0.03 + Math.random() * 0.04,
        phase: Math.random() * Math.PI * 2,
        r: Math.random() * 0.8 + 0.2,
        a: Math.random() * 0.3 + 0.08,
    });
}

// Accretion particles spiraling in
const ACCRETION_COUNT = 350;
const accretionParticles = [];
for (let i = 0; i < ACCRETION_COUNT; i++) {
    const dist = 40 + Math.random() * 200;
    accretionParticles.push({
        angle: Math.random() * Math.PI * 2,
        dist,
        speed: (0.12 + Math.random() * 0.15) * (120 / (dist + 20)),
        r: Math.random() * 1.0 + 0.2,
        a: Math.random() * 0.5 + 0.15,
        tier: dist < 80 ? 0 : dist < 140 ? 1 : 2,
        yOff: (Math.random() - 0.5) * 4,
    });
}

// Background stars
const stars = [];
for (let i = 0; i < 250; i++) {
    stars.push({
        x: Math.random() * 3000, y: Math.random() * 2000,
        r: Math.random() * 1.3 + 0.2, a: Math.random() * 0.3 + 0.05,
        speed: Math.random() * 0.08 + 0.02, phase: Math.random() * Math.PI * 2,
    });
}

const TILT = 0.35, ROT = -0.08;
const tierColors = [
    [220, 210, 255], // inner — white-blue hot
    [167, 139, 250], // mid — purple
    [80, 150, 230],  // outer — blue
];

function project(cx, cy, dist, angle) {
    const x3 = Math.cos(angle) * dist, y3 = Math.sin(angle) * dist;
    const cr = Math.cos(ROT), sr = Math.sin(ROT);
    return { x: cx + x3 * cr - y3 * sr, y: cy + (x3 * sr + y3 * cr) * TILT, depth: Math.sin(angle) };
}

// Magnetic field line shape: dipole curve
function fieldLinePoint(cx, cy, lineIdx, along, t) {
    const baseAngle = (lineIdx / 8) * Math.PI * 2;
    // Dipole: r = sin^2(theta) scaled — vertical axis
    const theta = along * Math.PI; // 0 to PI (pole to pole)
    const dipoleR = Math.sin(theta) * Math.sin(theta) * 180 + 25;
    const x = Math.cos(baseAngle) * dipoleR;
    // Vertical axis: poles at top/bottom
    const heightFactor = Math.cos(theta) * 160;
    return { x: cx + x, y: cy - heightFactor, a: Math.sin(theta) * 0.5 + 0.1 };
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = performance.now() * 0.001;
    const cx = canvas.width * 0.5, cy = canvas.height * 0.45;

    // Stars
    for (const s of stars) {
        const flicker = 0.6 + 0.4 * Math.sin(t * s.speed * 3 + s.phase);
        ctx.globalAlpha = s.a * flicker;
        ctx.fillStyle = '#c0b8e0';
        ctx.beginPath(); ctx.arc(s.x % canvas.width, s.y % canvas.height, s.r, 0, Math.PI * 2); ctx.fill();
    }

    // Accretion disk (behind) — tilted ring glow
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(ROT); ctx.scale(1, TILT);
    for (let i = 0; i < 3; i++) {
        const rd = 60 + i * 50;
        ctx.beginPath(); ctx.arc(0, 0, rd, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(120,100,220,${0.05 - i * 0.012})`; ctx.lineWidth = 18 + i * 8; ctx.stroke();
    }
    ctx.restore();

    // Accretion particles — back half
    const aProj = [];
    for (const p of accretionParticles) {
        const ang = p.angle + t * p.speed;
        const pr = project(cx, cy, p.dist, ang);
        aProj.push({ x: pr.x, y: pr.y + p.yOff, d: pr.depth, r: p.r, a: p.a, tier: p.tier });
    }
    aProj.sort((a, b) => a.d - b.d);
    for (const p of aProj) {
        if (p.d > 0) continue;
        const c = tierColors[p.tier];
        ctx.globalAlpha = p.a * 0.5;
        ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }

    // Magnetic field lines (behind star)
    ctx.globalAlpha = 1;
    for (const fp of fieldParticles) {
        const pos = (fp.along + t * fp.speed) % 1;
        const pt = fieldLinePoint(cx, cy, fp.fieldLine, pos, t);
        // Only draw if behind star (roughly) — skip occluded points
        if (Math.abs(pt.x - cx) < STAR_R * 2 && Math.abs(pt.y - cy) < STAR_R * 2) continue;
        ctx.globalAlpha = fp.a * pt.a * 0.85;
        ctx.fillStyle = 'rgba(150,140,255,1)';
        ctx.beginPath(); ctx.arc(pt.x, pt.y, fp.r, 0, Math.PI * 2); ctx.fill();
    }

    // Radiation jets — cone beams tracing a slow vertical infinity loop
    // Lemniscate parametric for beam direction angle
    const loopSpeed = t * 0.15; // slow sweep
    const loopParam = loopSpeed % (Math.PI * 2);
    const s = Math.sin(loopParam), c = Math.cos(loopParam);
    const denom = 1 + s * s;
    // Tilt angles from the lemniscate — controls where the jet points
    const tiltX = 0.35 * s * c / denom;  // side-to-side wobble
    const tiltY = 0.35 * c / denom;      // up-down sweep (figure-8 vertical)

    const beamAlpha = 0.45;

    ctx.save();
    ctx.translate(cx, cy);

    // Top jet — outer cone
    const topEndX = tiltX * JET_LENGTH;
    const topEndY = -JET_LENGTH + tiltY * JET_LENGTH * 0.3;
    const jetGradTop = ctx.createLinearGradient(0, -STAR_R, topEndX, topEndY);
    jetGradTop.addColorStop(0, `rgba(200,190,255,${beamAlpha})`);
    jetGradTop.addColorStop(0.08, `rgba(167,139,250,${beamAlpha * 0.8})`);
    jetGradTop.addColorStop(0.35, `rgba(125,211,252,${beamAlpha * 0.35})`);
    jetGradTop.addColorStop(1, 'rgba(56,189,248,0)');

    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(-3, -STAR_R);
    ctx.lineTo(topEndX - 20, topEndY);
    ctx.lineTo(topEndX + 20, topEndY);
    ctx.lineTo(3, -STAR_R);
    ctx.closePath();
    ctx.fillStyle = jetGradTop;
    ctx.fill();

    // Top jet — bright core
    ctx.beginPath();
    ctx.moveTo(0, -STAR_R);
    ctx.lineTo(topEndX - 6, topEndY * 0.8);
    ctx.lineTo(topEndX + 6, topEndY * 0.8);
    ctx.closePath();
    ctx.fillStyle = `rgba(220,215,255,${beamAlpha * 0.55})`;
    ctx.fill();

    // Bottom jet — mirrored, slightly dimmer
    const botAlpha = beamAlpha * 0.55;
    const botEndX = -tiltX * JET_LENGTH * 0.7;
    const botEndY = JET_LENGTH * 0.7 - tiltY * JET_LENGTH * 0.2;
    const jetGradBot = ctx.createLinearGradient(0, STAR_R, botEndX, botEndY);
    jetGradBot.addColorStop(0, `rgba(200,190,255,${botAlpha})`);
    jetGradBot.addColorStop(0.1, `rgba(167,139,250,${botAlpha * 0.7})`);
    jetGradBot.addColorStop(0.4, `rgba(125,211,252,${botAlpha * 0.25})`);
    jetGradBot.addColorStop(1, 'rgba(56,189,248,0)');

    ctx.beginPath();
    ctx.moveTo(-2, STAR_R);
    ctx.lineTo(botEndX - 16, botEndY);
    ctx.lineTo(botEndX + 16, botEndY);
    ctx.lineTo(2, STAR_R);
    ctx.closePath();
    ctx.fillStyle = jetGradBot;
    ctx.fill();

    ctx.restore();

    // Neutron star surface — intensely bright, tiny
    const pulse = 1 + Math.sin(t * 3) * 0.06; // rapid pulse
    const sr = STAR_R * pulse;

    // Outer magnetosphere glow
    const magGlow = ctx.createRadialGradient(cx, cy, sr, cx, cy, sr * 8);
    magGlow.addColorStop(0, 'rgba(167,139,250,0.22)');
    magGlow.addColorStop(0.3, 'rgba(120,110,240,0.09)');
    magGlow.addColorStop(0.6, 'rgba(56,189,248,0.02)');
    magGlow.addColorStop(1, 'rgba(56,189,248,0)');
    ctx.globalAlpha = 1;
    ctx.fillStyle = magGlow; ctx.beginPath(); ctx.arc(cx, cy, sr * 8, 0, Math.PI * 2); ctx.fill();

    // Hot corona
    const corona = ctx.createRadialGradient(cx, cy, sr * 0.8, cx, cy, sr * 2.5);
    corona.addColorStop(0, 'rgba(220,215,255,0.65)');
    corona.addColorStop(0.4, 'rgba(167,139,250,0.3)');
    corona.addColorStop(1, 'rgba(167,139,250,0)');
    ctx.fillStyle = corona; ctx.beginPath(); ctx.arc(cx, cy, sr * 2.5, 0, Math.PI * 2); ctx.fill();

    // Star body
    const starG = ctx.createRadialGradient(cx, cy, 0, cx, cy, sr);
    starG.addColorStop(0, '#f0ecff');
    starG.addColorStop(0.3, '#d8d0ff');
    starG.addColorStop(0.6, '#b0a0f0');
    starG.addColorStop(0.85, '#8070d0');
    starG.addColorStop(1, '#6050b0');
    ctx.fillStyle = starG; ctx.beginPath(); ctx.arc(cx, cy, sr, 0, Math.PI * 2); ctx.fill();

    // Hot spots at magnetic poles (follow beam direction)
    for (let pole = 0; pole < 2; pole++) {
        const sign = pole === 0 ? -1 : 1;
        const hx = cx + tiltX * sr * 0.6 * sign;
        const hy = cy + sign * (-sr * 0.5 + tiltY * sr * 0.2);
        const hotG = ctx.createRadialGradient(hx, hy, 0, hx, hy, sr * 0.4);
        hotG.addColorStop(0, 'rgba(255,250,255,0.6)');
        hotG.addColorStop(1, 'rgba(200,190,255,0)');
        ctx.fillStyle = hotG; ctx.beginPath(); ctx.arc(hx, hy, sr * 0.4, 0, Math.PI * 2); ctx.fill();
    }

    // Front accretion particles
    for (const p of aProj) {
        if (p.d <= 0) continue;
        const c = tierColors[p.tier];
        ctx.globalAlpha = p.a * (0.6 + p.d * 0.4);
        ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
        if (p.tier === 0) {
            const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
            glow.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${p.a * 0.2})`);
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2); ctx.fill();
        }
    }

    // Front field lines
    for (const fp of fieldParticles) {
        const pos = (fp.along + t * fp.speed) % 1;
        const pt = fieldLinePoint(cx, cy, fp.fieldLine, pos, t);
        if (!(Math.abs(pt.x - cx) < STAR_R * 2 && Math.abs(pt.y - cy) < STAR_R * 2)) continue; // only near-star ones
        ctx.globalAlpha = fp.a * pt.a * 0.4;
        ctx.fillStyle = 'rgba(140,130,255,1)';
        ctx.beginPath(); ctx.arc(pt.x, pt.y, fp.r, 0, Math.PI * 2); ctx.fill();
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
