<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aurora — P4: Binary Grove</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#060b10; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

// Aurora theme palette
// Green: 52,211,153 / 110,231,183 / 16,185,129
// Cyan:  56,189,248
// White: 255,255,255
// BG:    #060b10 → #0a1520

// ── Binary star system ──
const BINARY_CX = 0.48, BINARY_CY = 0.28;
const BINARY_ORBIT_R = 45;
const BINARY_SPEED = 0.12;
const BINARY_TILT = 0.38;

// Star A: green-white (larger, primary)
const STAR_A = { r: 22, color: '52,211,153', bright: '200,255,225', glowColor: '110,231,183' };
// Star B: cyan-blue (smaller, secondary)
const STAR_B = { r: 16, color: '56,189,248', bright: '200,235,255', glowColor: '125,211,252' };

// Orbiting debris / accretion particles around the binary system
const orbitParticles = [];
for (let i = 0; i < 180; i++) {
    const band = Math.random();
    const dist = 55 + band * 180;
    orbitParticles.push({
        angle: Math.random() * Math.PI * 2,
        dist,
        speed: (0.04 + Math.random() * 0.06) * (120 / (dist + 30)),
        r: Math.random() * 1.2 + 0.3,
        a: Math.random() * 0.4 + 0.1,
        yOff: (Math.random() - 0.5) * 4,
        // Color: mix of green, cyan, white
        colorType: band < 0.4 ? 0 : band < 0.7 ? 1 : 2,
    });
}

// Background stars
const stars = [];
for (let i = 0; i < 120; i++) {
    stars.push({
        x: Math.random(), y: Math.random() * 0.45,
        r: Math.random() * 0.8 + 0.2,
        a: Math.random() * 0.2 + 0.04,
        phase: Math.random() * Math.PI * 2,
        // Aurora palette stars
        c: Math.random() < 0.3 ? '52,211,153' : Math.random() < 0.5 ? '56,189,248' : '200,210,220',
    });
}

// Trees — organic with willow drapes, framing the sides
const trees = [];
function makeTree(x, layer) {
    const scale = [0.55, 0.75, 1.0][layer];
    const h = (0.28 + Math.random() * 0.22) * scale;
    const branches = [];
    const bCount = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < bCount; i++) {
        const side = Math.random() < 0.5 ? -1 : 1;
        const startY = 0.2 + Math.random() * 0.5;
        const isWillow = Math.random() < 0.4;
        branches.push({
            startY,
            angle: side * (0.3 + Math.random() * 0.6),
            len: (0.12 + Math.random() * 0.18) * scale,
            curve: side * (0.1 + Math.random() * 0.15),
            drapeCount: isWillow ? 2 + Math.floor(Math.random() * 3) : 0,
            drapeLen: (0.04 + Math.random() * 0.06) * scale,
        });
    }
    return { x, layer, h, trunkW: (3 + Math.random() * 5) * scale, branches, scale };
}
for (let i = 0; i < 3; i++) trees.push(makeTree(0.01 + Math.random() * 0.2, 0));
for (let i = 0; i < 3; i++) trees.push(makeTree(0.77 + Math.random() * 0.21, 0));
for (let i = 0; i < 2; i++) trees.push(makeTree(-0.01 + Math.random() * 0.22, 1));
for (let i = 0; i < 2; i++) trees.push(makeTree(0.76 + Math.random() * 0.23, 1));
for (let i = 0; i < 2; i++) trees.push(makeTree(-0.04 + Math.random() * 0.16, 2));
for (let i = 0; i < 2; i++) trees.push(makeTree(0.85 + Math.random() * 0.16, 2));
trees.sort((a, b) => a.layer - b.layer);

// Mushrooms at tree bases
const mushrooms = [];
for (const tr of trees) {
    if (tr.layer < 1) continue;
    const count = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
        mushrooms.push({
            x: tr.x + (Math.random() - 0.5) * 0.03,
            size: 3 + Math.random() * 5,
            glowR: 12 + Math.random() * 18,
            phase: Math.random() * Math.PI * 2,
            speed: 0.3 + Math.random() * 0.3,
            isGreen: Math.random() < 0.6,
        });
    }
}

// Fireflies
const fireflies = [];
for (let i = 0; i < 50; i++) {
    fireflies.push({
        x: 0.1 + Math.random() * 0.8, y: 0.3 + Math.random() * 0.4,
        baseX: 0, baseY: 0,
        r: 0.8 + Math.random() * 1.4,
        phase: Math.random() * Math.PI * 2,
        glowSpeed: 0.3 + Math.random() * 0.7,
        wanderRx: 0.008 + Math.random() * 0.02,
        wanderRy: 0.004 + Math.random() * 0.012,
        wanderSpeed: 0.06 + Math.random() * 0.1,
        wanderPhase: Math.random() * Math.PI * 2,
        isGreen: Math.random() < 0.65,
    });
    fireflies[i].baseX = fireflies[i].x;
    fireflies[i].baseY = fireflies[i].y;
}

// Lily pads
const lilyPads = [];
for (let i = 0; i < 7; i++) {
    lilyPads.push({
        x: 0.18 + Math.random() * 0.64,
        y: 0.74 + Math.random() * 0.07,
        size: 4 + Math.random() * 7,
        phase: Math.random() * Math.PI * 2,
        hasFlower: Math.random() < 0.35,
        glowPhase: Math.random() * Math.PI * 2,
    });
}

// Water ripples
const ripples = [];
for (let i = 0; i < 5; i++) {
    ripples.push({
        x: 0.2 + Math.random() * 0.6,
        y: 0.73 + Math.random() * 0.05,
        phase: Math.random() * Math.PI * 2,
        speed: 0.25 + Math.random() * 0.3,
        maxR: 12 + Math.random() * 25,
    });
}

// Mist — small subtle wisps
const mists = [];
for (let i = 0; i < 8; i++) {
    mists.push({
        x: Math.random(), y: 0.65 + Math.random() * 0.08,
        w: 0.04 + Math.random() * 0.06,
        speed: 0.003 + Math.random() * 0.005,
        a: 0.01 + Math.random() * 0.012,
        phase: Math.random() * Math.PI * 2,
    });
}

const WATER_Y = 0.72;

function binaryProject(cx, cy, dist, angle) {
    const x3 = Math.cos(angle) * dist, y3 = Math.sin(angle) * dist;
    return { x: cx + x3, y: cy + y3 * BINARY_TILT, depth: Math.sin(angle) };
}

function drawBinarySystem(t, w, h) {
    const cx = BINARY_CX * w, cy = BINARY_CY * h;
    const ang = t * BINARY_SPEED;

    const s1x = cx + Math.cos(ang) * BINARY_ORBIT_R;
    const s1y = cy + Math.sin(ang) * BINARY_ORBIT_R * BINARY_TILT;
    const s1d = Math.sin(ang);
    const s2x = cx + Math.cos(ang + Math.PI) * BINARY_ORBIT_R;
    const s2y = cy + Math.sin(ang + Math.PI) * BINARY_ORBIT_R * BINARY_TILT;
    const s2d = Math.sin(ang + Math.PI);

    // ── Massive ambient glow washing over the scene ──
    const ambientGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.55);
    ambientGlow.addColorStop(0, 'rgba(52,211,153,0.06)');
    ambientGlow.addColorStop(0.15, 'rgba(56,189,248,0.03)');
    ambientGlow.addColorStop(0.35, 'rgba(110,231,183,0.012)');
    ambientGlow.addColorStop(0.6, 'rgba(16,185,129,0.004)');
    ambientGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = ambientGlow;
    ctx.beginPath(); ctx.arc(cx, cy, Math.max(w, h) * 0.55, 0, Math.PI * 2); ctx.fill();

    // ── Accretion ring / shared orbital glow ──
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, BINARY_TILT);
    // Diffuse ring
    for (let ring = 0; ring < 3; ring++) {
        const rd = 60 + ring * 40;
        const alpha = [0.04, 0.025, 0.015][ring];
        ctx.beginPath(); ctx.arc(0, 0, rd, 0, Math.PI * 2);
        const ringColor = ring === 0 ? '110,231,183' : ring === 1 ? '56,189,248' : '52,211,153';
        ctx.strokeStyle = `rgba(${ringColor},${alpha})`;
        ctx.lineWidth = 12 + ring * 6;
        ctx.stroke();
    }
    // Bright orbital path
    ctx.beginPath(); ctx.arc(0, 0, BINARY_ORBIT_R, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(110,231,183,0.035)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // ── Orbital debris particles (behind) ──
    const orbColors = [
        [110, 231, 183],  // green
        [56, 189, 248],   // cyan
        [200, 220, 240],  // white-blue
    ];
    const projected = [];
    for (const p of orbitParticles) {
        const pAng = p.angle + t * p.speed;
        const pr = binaryProject(cx, cy, p.dist, pAng);
        projected.push({ x: pr.x, y: pr.y + p.yOff, d: pr.depth, r: p.r, a: p.a, ct: p.colorType });
    }
    projected.sort((a, b) => a.d - b.d);

    // Back particles
    for (const p of projected) {
        if (p.d > 0.1) continue;
        const c = orbColors[p.ct];
        ctx.globalAlpha = p.a * (0.5 + p.d * 0.5);
        ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }

    // ── Light bridge / tidal stream between the two stars ──
    const midX = (s1x + s2x) / 2, midY = (s1y + s2y) / 2;
    const bridgePulse = 0.7 + 0.3 * Math.sin(t * 0.8);
    // Multiple bridge strands
    for (let strand = 0; strand < 3; strand++) {
        const sOff = Math.sin(t * 0.5 + strand * 2) * 4;
        const cpx = midX + sOff;
        const cpy = midY + Math.cos(t * 0.6 + strand) * 3 - 5;
        ctx.beginPath();
        ctx.moveTo(s1x, s1y);
        ctx.quadraticCurveTo(cpx, cpy, s2x, s2y);
        const bAlpha = [0.06, 0.035, 0.02][strand] * bridgePulse;
        const bWidth = [4, 8, 14][strand];
        ctx.strokeStyle = strand === 0 ? `rgba(200,255,230,${bAlpha})` :
                          strand === 1 ? `rgba(110,231,183,${bAlpha})` :
                                         `rgba(56,189,248,${bAlpha})`;
        ctx.lineWidth = bWidth;
        ctx.lineCap = 'round';
        ctx.stroke();
    }

    // ── Draw stars sorted by depth ──
    const starPair = [
        { x: s1x, y: s1y, d: s1d, ...STAR_A, id: 'A' },
        { x: s2x, y: s2y, d: s2d, ...STAR_B, id: 'B' },
    ];
    starPair.sort((a, b) => a.d - b.d);

    for (const star of starPair) {
        const depthBright = 0.75 + 0.25 * star.d;
        const pulse = 1 + Math.sin(t * 0.4 + (star.id === 'A' ? 0 : Math.PI)) * 0.08;
        const sr = star.r * pulse;

        // Massive outer halo
        const outerHalo = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, sr * 8);
        outerHalo.addColorStop(0, `rgba(${star.glowColor},${0.08 * depthBright})`);
        outerHalo.addColorStop(0.2, `rgba(${star.color},${0.04 * depthBright})`);
        outerHalo.addColorStop(0.5, `rgba(${star.color},${0.012 * depthBright})`);
        outerHalo.addColorStop(1, 'transparent');
        ctx.fillStyle = outerHalo;
        ctx.beginPath(); ctx.arc(star.x, star.y, sr * 8, 0, Math.PI * 2); ctx.fill();

        // Inner glow
        const innerGlow = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, sr * 3);
        innerGlow.addColorStop(0, `rgba(${star.bright},${0.25 * depthBright})`);
        innerGlow.addColorStop(0.3, `rgba(${star.glowColor},${0.15 * depthBright})`);
        innerGlow.addColorStop(0.7, `rgba(${star.color},${0.04 * depthBright})`);
        innerGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = innerGlow;
        ctx.beginPath(); ctx.arc(star.x, star.y, sr * 3, 0, Math.PI * 2); ctx.fill();

        // Star body
        const body = ctx.createRadialGradient(star.x - sr * 0.1, star.y - sr * 0.1, 0, star.x, star.y, sr);
        body.addColorStop(0, `rgba(${star.bright},${0.5 * depthBright})`);
        body.addColorStop(0.3, `rgba(${star.bright},${0.35 * depthBright})`);
        body.addColorStop(0.7, `rgba(${star.color},${0.2 * depthBright})`);
        body.addColorStop(1, `rgba(${star.color},${0.05 * depthBright})`);
        ctx.fillStyle = body;
        ctx.beginPath(); ctx.arc(star.x, star.y, sr, 0, Math.PI * 2); ctx.fill();

        // Lens cross flare
        ctx.globalAlpha = 0.08 * depthBright * pulse;
        ctx.strokeStyle = `rgba(${star.bright},0.4)`;
        ctx.lineWidth = 1;
        // Horizontal flare
        ctx.beginPath();
        ctx.moveTo(star.x - sr * 5, star.y);
        ctx.lineTo(star.x + sr * 5, star.y);
        ctx.stroke();
        // Vertical flare
        ctx.beginPath();
        ctx.moveTo(star.x, star.y - sr * 3.5);
        ctx.lineTo(star.x, star.y + sr * 3.5);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    // ── Front particles ──
    for (const p of projected) {
        if (p.d <= 0.1) continue;
        const c = orbColors[p.ct];
        const da = p.a * (0.6 + p.d * 0.4);
        ctx.globalAlpha = da;
        // Glow on close particles
        if (p.ct === 0 && p.r > 0.8) {
            const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
            pg.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${da * 0.25})`);
            pg.addColorStop(1, 'transparent');
            ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    return { cx, cy, s1x, s1y, s2x, s2y };
}

function drawTree(tree, t, h_, w_) {
    const x = tree.x * w_;
    const baseY = h_ * (WATER_Y - 0.02 - tree.layer * 0.02);
    const treeH = tree.h * h_;
    const topY = baseY - treeH;
    const darkness = 0.88 + tree.layer * 0.04;

    ctx.strokeStyle = `rgba(4,12,18,${darkness})`;
    ctx.lineCap = 'round';
    ctx.lineWidth = tree.trunkW;
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.quadraticCurveTo(x + Math.sin(tree.x * 10) * 5, baseY - treeH * 0.5, x, topY);
    ctx.stroke();

    for (const b of tree.branches) {
        const sy = baseY - treeH * b.startY;
        const endX = x + Math.sin(b.angle) * b.len * h_;
        const endY = sy - Math.cos(b.angle) * b.len * h_ * 0.5;
        const cpX = (x + endX) / 2 + b.curve * h_ * 0.3;
        const cpY = (sy + endY) / 2 - 8;

        ctx.lineWidth = tree.trunkW * 0.4;
        ctx.strokeStyle = `rgba(4,12,18,${darkness * 0.9})`;
        ctx.beginPath();
        ctx.moveTo(x, sy);
        ctx.quadraticCurveTo(cpX, cpY, endX, endY);
        ctx.stroke();

        // Willow drapes
        if (b.drapeCount > 0) {
            for (let d = 0; d < b.drapeCount; d++) {
                const dFrac = d / Math.max(1, b.drapeCount - 1);
                const dx = x + (endX - x) * (0.5 + dFrac * 0.5);
                const dy = sy + (endY - sy) * (0.5 + dFrac * 0.5);
                const sway = Math.sin(t * 0.25 + d + tree.x * 5) * 3 * tree.scale;
                const dEndY = dy + b.drapeLen * h_;

                ctx.lineWidth = tree.trunkW * 0.2;
                ctx.strokeStyle = `rgba(4,12,18,${darkness * 0.7})`;
                ctx.beginPath();
                ctx.moveTo(dx, dy);
                ctx.quadraticCurveTo(dx + sway * 0.5, (dy + dEndY) / 2, dx + sway, dEndY);
                ctx.stroke();
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = performance.now() * 0.001;
    const w = canvas.width, h = canvas.height;
    const waterY = h * WATER_Y;

    // ── Sky — Aurora theme bg gradient (dark blue) ──
    const sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, '#060b10');
    sky.addColorStop(0.4, '#0a1520');
    sky.addColorStop(0.7, '#081018');
    sky.addColorStop(1, '#060b10');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

    // ── Background stars ──
    for (const s of stars) {
        ctx.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(t * 0.07 + s.phase));
        ctx.fillStyle = `rgba(${s.c},0.9)`;
        ctx.beginPath(); ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // ── Binary star system (main focus) ──
    const bpos = drawBinarySystem(t, w, h);

    // ── Back trees ──
    for (const tree of trees) {
        if (tree.layer < 2) drawTree(tree, t, h, w);
    }

    // ── Mushrooms ──
    for (const m of mushrooms) {
        const glow = 0.5 + 0.5 * Math.sin(t * m.speed + m.phase);
        const mx = m.x * w, my = waterY - 12;
        const cr = m.isGreen ? '52,211,153' : '56,189,248';
        const crB = m.isGreen ? '160,255,210' : '150,225,255';

        const mg = ctx.createRadialGradient(mx, my, 0, mx, my, m.glowR);
        mg.addColorStop(0, `rgba(${cr},${0.07 * glow})`);
        mg.addColorStop(0.5, `rgba(${cr},${0.02 * glow})`);
        mg.addColorStop(1, 'transparent');
        ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, m.glowR, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = `rgba(${crB},${0.22 * glow})`;
        ctx.beginPath();
        ctx.ellipse(mx, my - m.size * 0.8, m.size, m.size * 0.5, 0, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = `rgba(${cr},${0.1 * glow})`;
        ctx.fillRect(mx - 1, my - m.size * 0.7, 2, m.size * 0.7);
    }

    // ── Water surface ──
    const waterGrad = ctx.createLinearGradient(0, waterY, 0, h);
    waterGrad.addColorStop(0, 'rgba(6,14,20,0.3)');
    waterGrad.addColorStop(0.08, 'rgba(6,16,22,0.65)');
    waterGrad.addColorStop(0.35, 'rgba(5,12,18,0.88)');
    waterGrad.addColorStop(1, 'rgba(4,10,16,0.97)');
    ctx.fillStyle = waterGrad; ctx.fillRect(0, waterY, w, h - waterY);

    // ── Binary star reflections in water ──
    const reflections = [
        { sx: bpos.s1x, sy: bpos.s1y, color: STAR_A.color, glowColor: STAR_A.glowColor, r: STAR_A.r },
        { sx: bpos.s2x, sy: bpos.s2y, color: STAR_B.color, glowColor: STAR_B.glowColor, r: STAR_B.r },
    ];
    for (const sp of reflections) {
        const refBaseY = waterY + (waterY - sp.sy) * 0.12;
        // Wide reflection glow
        const refGlow = ctx.createRadialGradient(sp.sx, refBaseY + 15, 0, sp.sx, refBaseY + 15, sp.r * 4);
        refGlow.addColorStop(0, `rgba(${sp.glowColor},0.04)`);
        refGlow.addColorStop(0.5, `rgba(${sp.color},0.015)`);
        refGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = refGlow;
        ctx.beginPath(); ctx.arc(sp.sx, refBaseY + 15, sp.r * 4, 0, Math.PI * 2); ctx.fill();

        // Shimmering streaks
        for (let i = 0; i < 6; i++) {
            const ry = refBaseY + i * 9 + Math.sin(t * 0.5 + i) * 2;
            const rw = sp.r * (1.2 - i * 0.12);
            const ra = 0.03 - i * 0.004;
            if (ra <= 0) continue;
            const rg = ctx.createRadialGradient(
                sp.sx + Math.sin(t * 0.4 + i) * 3, ry, 0,
                sp.sx, ry, rw * 2.5
            );
            rg.addColorStop(0, `rgba(${sp.glowColor},${ra})`);
            rg.addColorStop(0.5, `rgba(${sp.color},${ra * 0.3})`);
            rg.addColorStop(1, 'transparent');
            ctx.fillStyle = rg;
            ctx.fillRect(sp.sx - rw * 2.5, ry - 4, rw * 5, 8);
        }
    }

    // Shared reflection glow (the two reflections blending in water)
    const refCx = (bpos.s1x + bpos.s2x) / 2;
    const refMerge = ctx.createRadialGradient(refCx, waterY + 40, 0, refCx, waterY + 40, 80);
    refMerge.addColorStop(0, 'rgba(80,210,170,0.02)');
    refMerge.addColorStop(0.5, 'rgba(56,189,248,0.008)');
    refMerge.addColorStop(1, 'transparent');
    ctx.fillStyle = refMerge;
    ctx.beginPath(); ctx.arc(refCx, waterY + 40, 80, 0, Math.PI * 2); ctx.fill();

    // ── Water ripples ──
    for (const rp of ripples) {
        const cycle = (t * rp.speed + rp.phase) % (Math.PI * 2);
        const progress = cycle / (Math.PI * 2);
        const rr = progress * rp.maxR;
        const alpha = (1 - progress) * 0.03;
        if (alpha < 0.002) continue;
        ctx.save();
        ctx.translate(rp.x * w, rp.y * h);
        ctx.scale(1, 0.3);
        ctx.beginPath(); ctx.arc(0, 0, rr, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(110,231,183,${alpha})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
        ctx.restore();
    }

    // ── Lily pads ──
    for (const lp of lilyPads) {
        const lx = lp.x * w + Math.sin(t * 0.2 + lp.phase) * 2;
        const ly = lp.y * h;
        const bob = Math.sin(t * 0.3 + lp.phase) * 1.5;

        ctx.save();
        ctx.translate(lx, ly + bob);
        ctx.scale(1, 0.4);
        ctx.beginPath();
        ctx.arc(0, 0, lp.size, 0.1, Math.PI * 2 - 0.1);
        ctx.lineTo(0, 0);
        ctx.closePath();
        ctx.fillStyle = 'rgba(12,40,30,0.4)';
        ctx.fill();
        ctx.restore();

        if (lp.hasFlower) {
            const fg = 0.5 + 0.5 * Math.sin(t * 0.4 + lp.glowPhase);
            const flGrad = ctx.createRadialGradient(lx, ly + bob, 0, lx, ly + bob, lp.size * 3);
            flGrad.addColorStop(0, `rgba(110,231,183,${0.05 * fg})`);
            flGrad.addColorStop(0.5, `rgba(52,211,153,${0.015 * fg})`);
            flGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = flGrad;
            ctx.beginPath(); ctx.arc(lx, ly + bob, lp.size * 3, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = `rgba(180,255,220,${0.25 * fg})`;
            ctx.beginPath(); ctx.arc(lx, ly + bob - lp.size * 0.3, 1.5, 0, Math.PI * 2); ctx.fill();
        }
    }

    // ── Front trees ──
    for (const tree of trees) {
        if (tree.layer >= 2) drawTree(tree, t, h, w);
    }

    // ── Mist ──
    for (const m of mists) {
        m.x += m.speed * 0.01;
        if (m.x > 1.3) m.x = -0.3;
        const breathe = 0.5 + 0.5 * Math.sin(t * 0.12 + m.phase);
        const mx = m.x * w, my = m.y * h, mw = m.w * w;
        const mg = ctx.createRadialGradient(mx, my, 0, mx, my, mw);
        mg.addColorStop(0, `rgba(52,211,153,${m.a * breathe})`);
        mg.addColorStop(0.4, `rgba(56,189,248,${m.a * breathe * 0.2})`);
        mg.addColorStop(1, 'transparent');
        ctx.fillStyle = mg;
        ctx.fillRect(mx - mw, my - mw * 0.3, mw * 2, mw * 0.6);
    }

    // ── Fireflies ──
    for (const f of fireflies) {
        const wp = t * f.wanderSpeed + f.wanderPhase;
        f.x = f.baseX + Math.sin(wp) * f.wanderRx;
        f.y = f.baseY + Math.sin(wp * 2) * f.wanderRy;

        const rawGlow = Math.sin(t * f.glowSpeed + f.phase);
        const glow = Math.pow(Math.max(0, rawGlow), 1.5);
        if (glow < 0.03) continue;

        const fx = f.x * w, fy = f.y * h;
        const cr = f.isGreen ? '110,231,183' : '56,189,248';
        const crBright = f.isGreen ? '200,255,225' : '200,235,255';

        ctx.globalAlpha = glow;
        const halo = ctx.createRadialGradient(fx, fy, 0, fx, fy, f.r * 14);
        halo.addColorStop(0, `rgba(${cr},0.10)`);
        halo.addColorStop(0.3, `rgba(${cr},0.03)`);
        halo.addColorStop(1, 'transparent');
        ctx.fillStyle = halo;
        ctx.beginPath(); ctx.arc(fx, fy, f.r * 14, 0, Math.PI * 2); ctx.fill();

        const core = ctx.createRadialGradient(fx, fy, 0, fx, fy, f.r * 2);
        core.addColorStop(0, `rgba(${crBright},${glow * 0.85})`);
        core.addColorStop(0.4, `rgba(${cr},${glow * 0.5})`);
        core.addColorStop(1, 'transparent');
        ctx.fillStyle = core;
        ctx.beginPath(); ctx.arc(fx, fy, f.r * 2, 0, Math.PI * 2); ctx.fill();

        // Water reflection
        if (fy < waterY) {
            const refFy = waterY + (waterY - fy) * 0.12;
            const refGlow = glow * 0.18;
            ctx.globalAlpha = refGlow;
            const refCore = ctx.createRadialGradient(fx, refFy, 0, fx, refFy, f.r * 3);
            refCore.addColorStop(0, `rgba(${cr},${refGlow * 0.5})`);
            refCore.addColorStop(1, 'transparent');
            ctx.fillStyle = refCore;
            ctx.beginPath(); ctx.arc(fx, refFy, f.r * 3, 0, Math.PI * 2); ctx.fill();
        }
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
