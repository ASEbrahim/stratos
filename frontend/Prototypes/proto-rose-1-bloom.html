<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Bloom - Login Theme Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080507; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W * 0.5;
    cy = H * 0.31;
}
resize();
window.addEventListener('resize', resize);

// Mouse tracking
let mouseX = -1000, mouseY = -1000;
let smoothMX = -1000, smoothMY = -1000;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('mouseleave', () => { mouseX = -1000; mouseY = -1000; });

// Colors
const PRIMARY = '#f43f5e';
const SECONDARY = '#fb7185';
const TERTIARY = '#fda4af';
const BRIGHT = '#fff0f3';
const DARK = '#e11d48';

// Stars
class Star {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 1.8 + 0.3;
        this.twinkleSpeed = Math.random() * 0.02 + 0.005;
        this.twinkleOffset = Math.random() * Math.PI * 2;
        const colors = ['#f43f5e', '#fb7185', '#fda4af', '#fff0f3', '#e11d48', '#ff6b8a'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
    }
}

const stars = [];
for (let i = 0; i < 200; i++) stars.push(new Star());

// Pollen particles
class Pollen {
    constructor() { this.reset(true); }
    reset(initial) {
        this.x = cx + (Math.random() - 0.5) * 30;
        this.y = initial ? cy - Math.random() * 200 : cy;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = -Math.random() * 1.2 - 0.3;
        this.size = Math.random() * 2.5 + 0.5;
        this.life = 1;
        this.decay = Math.random() * 0.004 + 0.002;
        this.color = Math.random() > 0.5 ? TERTIARY : BRIGHT;
    }
    update() {
        this.x += this.vx + Math.sin(Date.now() * 0.001 + this.x) * 0.2;
        this.y += this.vy;
        this.life -= this.decay;
        if (this.life <= 0) this.reset(false);
    }
    draw() {
        ctx.globalAlpha = this.life * 0.7;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

const pollens = [];
for (let i = 0; i < 60; i++) pollens.push(new Pollen());

// Draw background
function drawBackground(t) {
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, H * 0.5, Math.max(W, H));
    grad.addColorStop(0, '#1a0810');
    grad.addColorStop(0.5, '#120a0e');
    grad.addColorStop(1, '#080507');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
}

// Draw stars
function drawStars(t) {
    const starPositions = [];
    for (const s of stars) {
        let sx = s.x, sy = s.y;
        const dxm = sx - smoothMX, dym = sy - smoothMY;
        const distM = Math.sqrt(dxm * dxm + dym * dym);
        let alphaBoost = 0;
        if (distM < 150) {
            const push = (150 - distM) * 0.15;
            const angle = Math.atan2(dym, dxm);
            sx += Math.cos(angle) * push;
            sy += Math.sin(angle) * push;
            alphaBoost = (150 - distM) / 150 * 0.3;
        }
        const alpha = Math.min(1, 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset)) + alphaBoost);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
        ctx.fill();
        starPositions.push({ x: sx, y: sy });
    }
    ctx.globalAlpha = 1;
    if (smoothMX > -500) {
        ctx.strokeStyle = 'rgba(244, 63, 94, 0.1)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < starPositions.length; i++) {
            const si = starPositions[i];
            const dxi = si.x - smoothMX, dyi = si.y - smoothMY;
            if (dxi * dxi + dyi * dyi > 120 * 120) continue;
            for (let j = i + 1; j < starPositions.length; j++) {
                const sj = starPositions[j];
                const dxj = sj.x - smoothMX, dyj = sj.y - smoothMY;
                if (dxj * dxj + dyj * dyj > 120 * 120) continue;
                const ddx = si.x - sj.x, ddy = si.y - sj.y;
                if (ddx * ddx + ddy * ddy < 100 * 100) {
                    ctx.beginPath();
                    ctx.moveTo(si.x, si.y);
                    ctx.lineTo(sj.x, sj.y);
                    ctx.stroke();
                }
            }
        }
    }
}

// Draw ambient radial glow
function drawAmbientGlow(t) {
    const pulse = 0.6 + 0.15 * Math.sin(t * 0.001);
    const radius = Math.min(W, H) * 0.35 * pulse;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0, 'rgba(244,63,94,0.15)');
    grad.addColorStop(0.4, 'rgba(225,29,72,0.06)');
    grad.addColorStop(1, 'rgba(225,29,72,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
}

// Draw a single petal with bezier curves
function drawPetal(angle, innerR, outerR, width, bloom, layer, t) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle + t * 0.00005); // very slow rotation

    const openAngle = width * bloom;
    const tipX = outerR * bloom;
    const tipY = 0;
    const cp1x = innerR + (outerR - innerR) * 0.4;
    const cp1y = -openAngle * outerR * 0.6;
    const cp2x = innerR + (outerR - innerR) * 0.75;
    const cp2y = -openAngle * outerR * 0.3;
    const cp3x = cp2x;
    const cp3y = openAngle * outerR * 0.3;
    const cp4x = cp1x;
    const cp4y = openAngle * outerR * 0.6;

    // Petal shape
    ctx.beginPath();
    ctx.moveTo(innerR * 0.3, 0);
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tipX, tipY);
    ctx.bezierCurveTo(cp3x, cp3y, cp4x, cp4y, innerR * 0.3, 0);
    ctx.closePath();

    // Gradient fill based on layer
    const grad = ctx.createLinearGradient(innerR * 0.3, 0, tipX, 0);
    if (layer === 0) {
        grad.addColorStop(0, 'rgba(255,240,243,0.7)');
        grad.addColorStop(0.5, 'rgba(244,63,94,0.6)');
        grad.addColorStop(1, 'rgba(225,29,72,0.5)');
    } else if (layer === 1) {
        grad.addColorStop(0, 'rgba(251,113,133,0.55)');
        grad.addColorStop(0.5, 'rgba(244,63,94,0.45)');
        grad.addColorStop(1, 'rgba(225,29,72,0.35)');
    } else {
        grad.addColorStop(0, 'rgba(225,29,72,0.4)');
        grad.addColorStop(0.5, 'rgba(190,18,60,0.3)');
        grad.addColorStop(1, 'rgba(136,19,55,0.25)');
    }
    ctx.fillStyle = grad;
    ctx.fill();

    // Petal edge
    ctx.strokeStyle = layer === 0 ? 'rgba(253,164,175,0.3)' : 'rgba(225,29,72,0.2)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Vein lines
    ctx.beginPath();
    ctx.moveTo(innerR * 0.4, 0);
    ctx.quadraticCurveTo(innerR + (outerR - innerR) * 0.5, 0, tipX * 0.95, 0);
    ctx.strokeStyle = layer === 0 ? 'rgba(255,240,243,0.15)' : 'rgba(253,164,175,0.1)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Side veins
    for (let v = 0; v < 3; v++) {
        const frac = 0.3 + v * 0.2;
        const vx = innerR * 0.3 + (tipX - innerR * 0.3) * frac;
        const vy1 = -openAngle * outerR * 0.15 * frac;
        const vy2 = openAngle * outerR * 0.15 * frac;
        ctx.beginPath();
        ctx.moveTo(vx * 0.9, 0);
        ctx.quadraticCurveTo(vx, vy1 * 0.5, vx + outerR * 0.05, vy1);
        ctx.strokeStyle = 'rgba(253,164,175,0.07)';
        ctx.lineWidth = 0.4;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(vx * 0.9, 0);
        ctx.quadraticCurveTo(vx, vy2 * 0.5, vx + outerR * 0.05, vy2);
        ctx.stroke();
    }

    ctx.restore();
}

// Draw mouse glow
function drawMouseGlow() {
    if (smoothMX > -500) {
        const glow = ctx.createRadialGradient(smoothMX, smoothMY, 0, smoothMX, smoothMY, 30);
        glow.addColorStop(0, 'rgba(244, 63, 94, 0.05)');
        glow.addColorStop(1, 'rgba(244, 63, 94, 0)');
        ctx.beginPath();
        ctx.arc(smoothMX, smoothMY, 30, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
    }
}

// Draw the rose
function drawRose(t) {
    const breathe = 0.85 + 0.15 * Math.sin(t * 0.0008);
    const baseR = Math.min(W, H) * 0.12;
    const ppx = smoothMX > -500 ? (smoothMX / W - 0.5) * 15 : 0;
    const ppy = smoothMX > -500 ? (smoothMY / H - 0.5) * 10 : 0;
    const oldCx = cx, oldCy = cy;
    cx += ppx; cy += ppy;

    // Global slow rotation
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 0.00008);
    ctx.translate(-cx, -cy);

    // Outer petals (layer 2) — 7 petals
    for (let i = 0; i < 7; i++) {
        const angle = (i / 7) * Math.PI * 2 + 0.15;
        drawPetal(angle, baseR * 0.15, baseR * 1.6, 0.28 * breathe, breathe, 2, t);
    }

    // Middle petals (layer 1) — 6 petals
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + 0.4;
        drawPetal(angle, baseR * 0.1, baseR * 1.1, 0.32 * breathe, breathe * 0.9, 1, t);
    }

    // Inner petals (layer 0) — 5 petals
    for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2;
        drawPetal(angle, baseR * 0.05, baseR * 0.7, 0.38 * breathe, breathe * 0.8, 0, t);
    }

    // Center glow
    const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 0.25);
    centerGrad.addColorStop(0, 'rgba(255,240,243,0.5)');
    centerGrad.addColorStop(0.5, 'rgba(244,63,94,0.25)');
    centerGrad.addColorStop(1, 'rgba(244,63,94,0)');
    ctx.fillStyle = centerGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * 0.25, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    cx = oldCx; cy = oldCy;
}

function animate(t) {
    smoothMX += (mouseX - smoothMX) * 0.05;
    smoothMY += (mouseY - smoothMY) * 0.05;
    drawBackground(t);
    drawStars(t);
    drawAmbientGlow(t);

    // Update and draw pollen behind rose
    for (const p of pollens) {
        p.update();
        p.draw();
    }

    // Rose drawn last (on top)
    drawRose(t);
    drawMouseGlow();

    requestAnimationFrame(animate);
}

// Handle star repositioning on resize
window.addEventListener('resize', () => {
    for (const s of stars) {
        s.x = Math.random() * W;
        s.y = Math.random() * H;
    }
});

requestAnimationFrame(animate);
</script>
</body>
</html>
