<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noir Theme - Crystal Lattice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050506; overflow: hidden; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// Mouse tracking
let mouseX = -1000, mouseY = -1000;
let smoothMX = -1000, smoothMY = -1000;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('mouseleave', () => { mouseX = -1000; mouseY = -1000; });

// Stars
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.5 + 0.3,
    twinkleSpeed: Math.random() * 0.02 + 0.005,
    twinkleOffset: Math.random() * Math.PI * 2,
    color: ['#a78bfa', '#8b5cf6', '#c4b5fd', '#e8e0ff'][Math.floor(Math.random() * 4)]
  });
}

// Crystal fragments orbiting
const fragments = [];
for (let i = 0; i < 18; i++) {
  const a = (i / 18) * Math.PI * 2 + Math.random() * 0.3;
  fragments.push({
    angle: a,
    dist: Math.random() * 60 + 80,
    speed: (Math.random() * 0.003 + 0.002) * (Math.random() > 0.5 ? 1 : -1),
    size: Math.random() * 6 + 3,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: Math.random() * 0.02 - 0.01,
    wobble: Math.random() * 10,
    wobbleSpeed: Math.random() * 0.01 + 0.005
  });
}

function drawBackground(t) {
  const w = W(), h = H();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#0f0a24');
  grad.addColorStop(1, '#050506');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

function drawStars(t) {
  const w = W(), h = H();
  const starPositions = [];
  for (const s of stars) {
    let sx = s.x * w, sy = s.y * h;
    const dxm = sx - smoothMX, dym = sy - smoothMY;
    const distM = Math.sqrt(dxm * dxm + dym * dym);
    let alphaBoost = 0;
    if (distM < 150) {
      const push = (150 - distM) * 0.15;
      const angle = Math.atan2(dym, dxm);
      sx += Math.cos(angle) * push;
      sy += Math.sin(angle) * push;
      alphaBoost = (150 - distM) / 150 * 0.3;
    }
    const alpha = Math.min(1, 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset)) + alphaBoost);
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    starPositions.push({ x: sx, y: sy });
  }
  ctx.globalAlpha = 1;
  if (smoothMX > -500) {
    ctx.strokeStyle = 'rgba(167, 139, 250, 0.1)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < starPositions.length; i++) {
      const si = starPositions[i];
      const dxi = si.x - smoothMX, dyi = si.y - smoothMY;
      if (dxi * dxi + dyi * dyi > 120 * 120) continue;
      for (let j = i + 1; j < starPositions.length; j++) {
        const sj = starPositions[j];
        const dxj = sj.x - smoothMX, dyj = sj.y - smoothMY;
        if (dxj * dxj + dyj * dyj > 120 * 120) continue;
        const ddx = si.x - sj.x, ddy = si.y - sj.y;
        if (ddx * ddx + ddy * ddy < 100 * 100) {
          ctx.beginPath();
          ctx.moveTo(si.x, si.y);
          ctx.lineTo(sj.x, sj.y);
          ctx.stroke();
        }
      }
    }
  }
}

// 3D point rotation
function rotateY(p, a) {
  const cos = Math.cos(a), sin = Math.sin(a);
  return { x: p.x * cos - p.z * sin, y: p.y, z: p.x * sin + p.z * cos };
}
function rotateX(p, a) {
  const cos = Math.cos(a), sin = Math.sin(a);
  return { x: p.x, y: p.y * cos - p.z * sin, z: p.y * sin + p.z * cos };
}
function rotateZ(p, a) {
  const cos = Math.cos(a), sin = Math.sin(a);
  return { x: p.x * cos - p.y * sin, y: p.x * sin + p.y * cos, z: p.z };
}

function project(p, cx, cy, scale) {
  const perspective = 300;
  const factor = perspective / (perspective + p.z);
  return { x: cx + p.x * factor * scale, y: cy + p.y * factor * scale, depth: p.z };
}

// Diamond / octahedron vertices
function getCrystalVertices(size) {
  return [
    { x: 0, y: -size * 1.4, z: 0 },   // top
    { x: size, y: 0, z: 0 },            // right
    { x: 0, y: 0, z: size },            // front
    { x: -size, y: 0, z: 0 },           // left
    { x: 0, y: 0, z: -size },           // back
    { x: 0, y: size * 1.4, z: 0 }       // bottom
  ];
}

const crystalFaces = [
  [0, 1, 2], [0, 2, 3], [0, 3, 4], [0, 4, 1],
  [5, 2, 1], [5, 3, 2], [5, 4, 3], [5, 1, 4]
];

const crystalEdges = [
  [0, 1], [0, 2], [0, 3], [0, 4],
  [1, 2], [2, 3], [3, 4], [4, 1],
  [5, 1], [5, 2], [5, 3], [5, 4]
];

function drawMouseGlow() {
  if (smoothMX > -500) {
    const glow = ctx.createRadialGradient(smoothMX, smoothMY, 0, smoothMX, smoothMY, 30);
    glow.addColorStop(0, 'rgba(167, 139, 250, 0.05)');
    glow.addColorStop(1, 'rgba(167, 139, 250, 0)');
    ctx.beginPath();
    ctx.arc(smoothMX, smoothMY, 30, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }
}

function drawCrystal(t) {
  const w = W(), h = H();
  const px = (smoothMX / w - 0.5) * 15;
  const py = (smoothMY / h - 0.5) * 10;
  const cx = w * 0.5 + (smoothMX > -500 ? px : 0);
  const cy = h * 0.32 + (smoothMX > -500 ? py : 0);
  const time = t * 0.001;

  // Breathing/pulsing size
  const breathe = 1 + 0.08 * Math.sin(time * 1.5);
  const baseSize = 45 * breathe;

  const ry = time * 0.4;
  const rx = 0.3 + Math.sin(time * 0.3) * 0.15;
  const rz = time * 0.15;

  const verts = getCrystalVertices(baseSize);

  // Transform vertices
  const transformed = verts.map(v => {
    let p = rotateY(v, ry);
    p = rotateX(p, rx);
    p = rotateZ(p, rz);
    return p;
  });

  const projected = transformed.map(p => project(p, cx, cy, 1));

  // Outer glow
  const outerGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 120);
  outerGlow.addColorStop(0, 'rgba(167, 139, 250, 0.1)');
  outerGlow.addColorStop(0.5, 'rgba(139, 92, 246, 0.03)');
  outerGlow.addColorStop(1, 'rgba(139, 92, 246, 0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 120, 0, Math.PI * 2);
  ctx.fillStyle = outerGlow;
  ctx.fill();

  // Orbiting fragments
  for (const f of fragments) {
    f.angle += f.speed;
    f.rotation += f.rotSpeed;
    const wobble = Math.sin(t * f.wobbleSpeed) * f.wobble;
    const fx = cx + Math.cos(f.angle) * (f.dist + wobble);
    const fy = cy + Math.sin(f.angle) * (f.dist * 0.5 + wobble * 0.3);

    ctx.save();
    ctx.translate(fx, fy);
    ctx.rotate(f.rotation);
    ctx.beginPath();
    // Small diamond shape
    const s = f.size;
    ctx.moveTo(0, -s);
    ctx.lineTo(s * 0.6, 0);
    ctx.lineTo(0, s * 0.7);
    ctx.lineTo(-s * 0.6, 0);
    ctx.closePath();
    ctx.fillStyle = `rgba(167, 139, 250, ${0.15 + 0.1 * Math.sin(f.angle * 2)})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(196, 181, 253, ${0.25 + 0.15 * Math.sin(f.angle * 3)})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }

  // Prismatic light rays from vertices
  for (let i = 0; i < projected.length; i++) {
    const p = projected[i];
    const rayAlpha = 0.06 + 0.04 * Math.sin(time * 2 + i);
    const rayLen = 60 + 30 * Math.sin(time * 1.5 + i * 1.2);
    const rayAngle = time * 0.5 + (i / projected.length) * Math.PI * 2;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(rayAngle);
    const rayGrad = ctx.createLinearGradient(0, 0, rayLen, 0);
    rayGrad.addColorStop(0, `rgba(232, 224, 255, ${rayAlpha * 2})`);
    rayGrad.addColorStop(0.3, `rgba(196, 181, 253, ${rayAlpha})`);
    rayGrad.addColorStop(1, 'rgba(139, 92, 246, 0)');
    ctx.beginPath();
    ctx.moveTo(0, -1);
    ctx.lineTo(rayLen, -0.3);
    ctx.lineTo(rayLen, 0.3);
    ctx.lineTo(0, 1);
    ctx.closePath();
    ctx.fillStyle = rayGrad;
    ctx.fill();
    ctx.restore();
  }

  // Draw faces (sorted by depth)
  const facesWithDepth = crystalFaces.map((face, idx) => {
    const avgZ = face.reduce((s, vi) => s + transformed[vi].z, 0) / face.length;
    return { face, idx, avgZ };
  }).sort((a, b) => b.avgZ - a.avgZ);

  for (const { face, idx } of facesWithDepth) {
    const pts = face.map(vi => projected[vi]);

    // Normal calculation for lighting
    const v1 = { x: transformed[face[1]].x - transformed[face[0]].x, y: transformed[face[1]].y - transformed[face[0]].y, z: transformed[face[1]].z - transformed[face[0]].z };
    const v2 = { x: transformed[face[2]].x - transformed[face[0]].x, y: transformed[face[2]].y - transformed[face[0]].y, z: transformed[face[2]].z - transformed[face[0]].z };
    const normal = { x: v1.y * v2.z - v1.z * v2.y, y: v1.z * v2.x - v1.x * v2.z, z: v1.x * v2.y - v1.y * v2.x };
    const len = Math.sqrt(normal.x * normal.x + normal.y * normal.y + normal.z * normal.z);
    const nz = normal.z / (len || 1);
    const light = Math.abs(nz);

    // Hexagonal-inspired face fill
    const faceAlpha = 0.08 + light * 0.2;
    const r = Math.round(139 + light * 57);
    const g = Math.round(92 + light * 89);
    const b2 = Math.round(246 + light * 9);

    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.fillStyle = `rgba(${r}, ${g}, ${Math.min(b2, 255)}, ${faceAlpha})`;
    ctx.fill();

    // Internal refraction lines
    if (light > 0.3) {
      const midX = (pts[0].x + pts[1].x + pts[2].x) / 3;
      const midY = (pts[0].y + pts[1].y + pts[2].y) / 3;
      for (let i = 0; i < pts.length; i++) {
        ctx.beginPath();
        ctx.moveTo(midX, midY);
        ctx.lineTo(pts[i].x, pts[i].y);
        ctx.strokeStyle = `rgba(196, 181, 253, ${light * 0.15})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  // Draw edges
  for (const [a, b] of crystalEdges) {
    const pa = projected[a], pb = projected[b];
    const edgeAlpha = 0.3 + 0.2 * Math.sin(time * 2 + a + b);
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = `rgba(196, 181, 253, ${edgeAlpha})`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  // Vertex highlights
  for (let i = 0; i < projected.length; i++) {
    const p = projected[i];
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 6);
    const vertAlpha = 0.4 + 0.3 * Math.sin(time * 3 + i);
    glow.addColorStop(0, `rgba(232, 224, 255, ${vertAlpha})`);
    glow.addColorStop(1, 'rgba(167, 139, 250, 0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  // Center glow
  const centerGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseSize * 0.6);
  centerGlow.addColorStop(0, `rgba(232, 224, 255, ${0.12 * breathe})`);
  centerGlow.addColorStop(0.5, 'rgba(167, 139, 250, 0.04)');
  centerGlow.addColorStop(1, 'rgba(139, 92, 246, 0)');
  ctx.beginPath();
  ctx.arc(cx, cy, baseSize * 0.6, 0, Math.PI * 2);
  ctx.fillStyle = centerGlow;
  ctx.fill();
}

function animate(t) {
  smoothMX += (mouseX - smoothMX) * 0.05;
  smoothMY += (mouseY - smoothMY) * 0.05;
  const w = W(), h = H();
  ctx.clearRect(0, 0, w, h);
  drawBackground(t);
  drawStars(t);
  drawCrystal(t);
  drawMouseGlow();
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
