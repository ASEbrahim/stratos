<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight Theme - Lighthouse</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050810; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Mouse tracking
let mouseX = -1000, mouseY = -1000;
let smoothMX = -1000, smoothMY = -1000;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('mouseleave', () => { mouseX = -1000; mouseY = -1000; });

// Stars
const stars = [];
for (let i = 0; i < 250; i++) {
    stars.push({
        x: Math.random(),
        y: Math.random() * 0.6, // upper portion only
        r: Math.random() * 1.4 + 0.3,
        twinkleSpeed: Math.random() * 2 + 0.8,
        twinkleOffset: Math.random() * Math.PI * 2,
        color: Math.random() < 0.4
            ? [16, 185, 129]
            : Math.random() < 0.5
                ? [52, 211, 153]
                : [120, 180, 210]
    });
}

// Distant ship lights
const ships = [];
for (let i = 0; i < 5; i++) {
    ships.push({
        x: 0.1 + Math.random() * 0.8,
        y: 0.72 + Math.random() * 0.03,
        twinkleSpeed: Math.random() * 1.5 + 0.5,
        twinkleOffset: Math.random() * Math.PI * 2,
        size: Math.random() * 1.5 + 1
    });
}

// Fog/mist particles
const fogParticles = [];
for (let i = 0; i < 60; i++) {
    fogParticles.push({
        x: Math.random() * 1.4 - 0.2,
        y: 0.3 + Math.random() * 0.5,
        speed: 0.005 + Math.random() * 0.01,
        size: 30 + Math.random() * 80,
        opacity: 0.01 + Math.random() * 0.03
    });
}

// Beam angle
let beamAngle = 0;
const BEAM_SPEED = 0.3; // radians per second

// Lighthouse position
const LH_X = 0.5;
const LH_BASE_Y = 0.95;
const LH_LANTERN_Y = 0.58;

function drawBackground(t) {
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#050810');
    grd.addColorStop(0.55, '#080d18');
    grd.addColorStop(0.7, '#0a1020');
    grd.addColorStop(1, '#0e1026');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
}

function drawStars(t) {
    const starPositions = [];
    for (const s of stars) {
        let sx = s.x * W, sy = s.y * H;
        const dxm = sx - smoothMX, dym = sy - smoothMY;
        const distM = Math.sqrt(dxm * dxm + dym * dym);
        let alphaBoost = 0;
        if (distM < 150) {
            const push = (150 - distM) * 0.15;
            const angle = Math.atan2(dym, dxm);
            sx += Math.cos(angle) * push;
            sy += Math.sin(angle) * push;
            alphaBoost = (150 - distM) / 150 * 0.3;
        }
        const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
        const [r, g, b] = s.color;
        ctx.beginPath();
        ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(1, twinkle * 0.7 + alphaBoost)})`;
        ctx.fill();
        starPositions.push({ x: sx, y: sy });
    }
    if (smoothMX > -500) {
        ctx.strokeStyle = 'rgba(16, 185, 129, 0.1)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < starPositions.length; i++) {
            const si = starPositions[i];
            const dxi = si.x - smoothMX, dyi = si.y - smoothMY;
            if (dxi * dxi + dyi * dyi > 120 * 120) continue;
            for (let j = i + 1; j < starPositions.length; j++) {
                const sj = starPositions[j];
                const dxj = sj.x - smoothMX, dyj = sj.y - smoothMY;
                if (dxj * dxj + dyj * dyj > 120 * 120) continue;
                const ddx = si.x - sj.x, ddy = si.y - sj.y;
                if (ddx * ddx + ddy * ddy < 100 * 100) {
                    ctx.beginPath();
                    ctx.moveTo(si.x, si.y);
                    ctx.lineTo(sj.x, sj.y);
                    ctx.stroke();
                }
            }
        }
    }
}

function drawOcean(t) {
    // Ocean surface
    const oceanY = 0.75 * H;
    const grd = ctx.createLinearGradient(0, oceanY, 0, H);
    grd.addColorStop(0, 'rgba(5,10,25,0.8)');
    grd.addColorStop(1, 'rgba(8,13,24,1)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, oceanY, W, H - oceanY);

    // Wave lines
    ctx.lineWidth = 1;
    for (let row = 0; row < 12; row++) {
        const wy = oceanY + 10 + row * ((H - oceanY - 10) / 12);
        ctx.beginPath();
        for (let x = 0; x <= W; x += 3) {
            const wave = Math.sin(x * 0.008 + t * 0.8 + row * 0.7) * (3 + row * 0.5)
                       + Math.sin(x * 0.015 + t * 1.2 + row) * 2;
            if (x === 0) ctx.moveTo(x, wy + wave);
            else ctx.lineTo(x, wy + wave);
        }
        const alpha = 0.06 - row * 0.003;
        ctx.strokeStyle = `rgba(16,185,129,${Math.max(alpha, 0.01)})`;
        ctx.stroke();
    }

    // Ship lights
    for (const ship of ships) {
        const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * ship.twinkleSpeed + ship.twinkleOffset));
        const sx = ship.x * W;
        const sy = ship.y * H + Math.sin(t * 0.5 + ship.twinkleOffset) * 3;

        // Glow
        const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, ship.size * 8);
        glow.addColorStop(0, `rgba(209,250,229,${0.15 * twinkle})`);
        glow.addColorStop(1, 'rgba(209,250,229,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(sx - 40, sy - 40, 80, 80);

        ctx.beginPath();
        ctx.arc(sx, sy, ship.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(209,250,229,${twinkle * 0.8})`;
        ctx.fill();
    }
}

function drawBeam(t) {
    const lx = LH_X * W;
    const ly = LH_LANTERN_Y * H;
    const angle = beamAngle;

    // The beam is a wide cone
    const beamLength = Math.max(W, H) * 1.2;
    const halfSpread = 0.18; // radians, cone half-angle

    const a1 = angle - halfSpread;
    const a2 = angle + halfSpread;

    // How much beam faces viewer (toward camera = angle near -PI/2 i.e. upward, or toward center)
    // Brighten when sweeping horizontally across center
    const facingFactor = 0.4 + 0.6 * Math.max(0, Math.cos(angle));

    ctx.save();

    // Main beam cone
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx + Math.cos(a1) * beamLength, ly + Math.sin(a1) * beamLength);
    ctx.lineTo(lx + Math.cos(a2) * beamLength, ly + Math.sin(a2) * beamLength);
    ctx.closePath();

    const beamGrd = ctx.createRadialGradient(lx, ly, 0, lx, ly, beamLength * 0.8);
    beamGrd.addColorStop(0, `rgba(16,185,129,${0.25 * facingFactor})`);
    beamGrd.addColorStop(0.3, `rgba(16,185,129,${0.1 * facingFactor})`);
    beamGrd.addColorStop(0.7, `rgba(52,211,153,${0.03 * facingFactor})`);
    beamGrd.addColorStop(1, 'rgba(52,211,153,0)');
    ctx.fillStyle = beamGrd;
    ctx.fill();

    // Inner brighter beam
    const innerSpread = 0.06;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx + Math.cos(angle - innerSpread) * beamLength, ly + Math.sin(angle - innerSpread) * beamLength);
    ctx.lineTo(lx + Math.cos(angle + innerSpread) * beamLength, ly + Math.sin(angle + innerSpread) * beamLength);
    ctx.closePath();

    const innerGrd = ctx.createRadialGradient(lx, ly, 0, lx, ly, beamLength * 0.6);
    innerGrd.addColorStop(0, `rgba(209,250,229,${0.15 * facingFactor})`);
    innerGrd.addColorStop(0.4, `rgba(16,185,129,${0.06 * facingFactor})`);
    innerGrd.addColorStop(1, 'rgba(16,185,129,0)');
    ctx.fillStyle = innerGrd;
    ctx.fill();

    ctx.restore();

    // Scene brightening when beam sweeps toward viewer
    if (facingFactor > 0.6) {
        const sceneBright = (facingFactor - 0.6) / 0.4;
        ctx.fillStyle = `rgba(16,185,129,${0.02 * sceneBright})`;
        ctx.fillRect(0, 0, W, H);
    }
}

function drawFog(t) {
    for (const p of fogParticles) {
        p.x += p.speed * 0.016;
        if (p.x > 1.3) p.x = -0.3;

        const fx = p.x * W;
        const fy = p.y * H + Math.sin(t * 0.3 + p.x * 5) * 15;

        const grd = ctx.createRadialGradient(fx, fy, 0, fx, fy, p.size);
        grd.addColorStop(0, `rgba(16,185,129,${p.opacity})`);
        grd.addColorStop(1, 'rgba(16,185,129,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(fx - p.size, fy - p.size, p.size * 2, p.size * 2);
    }
}

function drawLighthouse(t) {
    const lx = LH_X * W;
    const baseY = LH_BASE_Y * H;
    const lanternY = LH_LANTERN_Y * H;

    // Tower body (tapered)
    const baseWidth = 28;
    const topWidth = 14;

    ctx.beginPath();
    ctx.moveTo(lx - baseWidth, baseY);
    ctx.lineTo(lx - topWidth, lanternY + 20);
    ctx.lineTo(lx + topWidth, lanternY + 20);
    ctx.lineTo(lx + baseWidth, baseY);
    ctx.closePath();
    ctx.fillStyle = '#0a0e1a';
    ctx.fill();
    // Subtle edge highlight
    ctx.strokeStyle = 'rgba(16,185,129,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Horizontal stripes on tower
    const towerHeight = baseY - (lanternY + 20);
    for (let i = 1; i < 6; i++) {
        const frac = i / 6;
        const sy = lanternY + 20 + frac * towerHeight;
        const widthAtY = topWidth + (baseWidth - topWidth) * frac;
        ctx.beginPath();
        ctx.moveTo(lx - widthAtY, sy);
        ctx.lineTo(lx + widthAtY, sy);
        ctx.strokeStyle = 'rgba(16,185,129,0.08)';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Lantern room (gallery)
    const galleryWidth = 18;
    const galleryHeight = 20;
    ctx.beginPath();
    ctx.rect(lx - galleryWidth, lanternY, galleryWidth * 2, galleryHeight);
    ctx.fillStyle = '#0a0e1a';
    ctx.fill();
    ctx.strokeStyle = 'rgba(16,185,129,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Dome on top
    ctx.beginPath();
    ctx.arc(lx, lanternY, galleryWidth, Math.PI, 0);
    ctx.fillStyle = '#0a0e1a';
    ctx.fill();
    ctx.strokeStyle = 'rgba(16,185,129,0.2)';
    ctx.stroke();

    // Lantern glow
    const glowPulse = 0.8 + 0.2 * Math.sin(t * 3);
    const glowR = 35;
    const glow = ctx.createRadialGradient(lx, lanternY + 10, 0, lx, lanternY + 10, glowR);
    glow.addColorStop(0, `rgba(209,250,229,${0.9 * glowPulse})`);
    glow.addColorStop(0.2, `rgba(16,185,129,${0.5 * glowPulse})`);
    glow.addColorStop(0.6, `rgba(16,185,129,${0.15 * glowPulse})`);
    glow.addColorStop(1, 'rgba(16,185,129,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(lx, lanternY + 10, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Lantern window bright center
    ctx.beginPath();
    ctx.arc(lx, lanternY + 10, 6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(209,250,229,${0.95 * glowPulse})`;
    ctx.fill();
}

function drawMouseGlow() {
    if (smoothMX > -500) {
        const glow = ctx.createRadialGradient(smoothMX, smoothMY, 0, smoothMX, smoothMY, 30);
        glow.addColorStop(0, 'rgba(16, 185, 129, 0.04)');
        glow.addColorStop(1, 'rgba(16, 185, 129, 0)');
        ctx.beginPath();
        ctx.arc(smoothMX, smoothMY, 30, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
    }
}

let startTime = null;
function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const t = (timestamp - startTime) / 1000;
    smoothMX += (mouseX - smoothMX) * 0.05;
    smoothMY += (mouseY - smoothMY) * 0.05;

    beamAngle = Math.sin(t * BEAM_SPEED) * 1.2 - Math.PI / 2;

    drawBackground(t);
    drawStars(t);
    drawBeam(t);
    drawOcean(t);
    drawFog(t);
    // Lighthouse drawn LAST (on top) - with parallax
    const ppx = smoothMX > -500 ? (smoothMX / W - 0.5) * 15 : 0;
    const ppy = smoothMX > -500 ? (smoothMY / H - 0.5) * 10 : 0;
    ctx.save();
    ctx.translate(ppx, ppy);
    drawLighthouse(t);
    ctx.restore();
    drawMouseGlow();

    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
