<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos Prototype 2 - Subtle Background Solar System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #07080f;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
.overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
}
.overlay h1 {
    color: rgba(232, 185, 49, 0.15);
    font-size: 4rem;
    font-weight: 200;
    letter-spacing: 0.3em;
    text-transform: uppercase;
}
.info {
    position: fixed; bottom: 20px; left: 20px; color: #7a8bb5;
    font-size: 12px; z-index: 10; opacity: 0.6;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay"><h1>StratOS</h1></div>
<div class="info">Prototype 2: Off-center solar system, parallax mouse, dust particles</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', () => {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    resize();
});

const W = () => window.innerWidth;
const H = () => window.innerHeight;

let mouseX = W() / 2, mouseY = H() / 2;
let smoothMX = mouseX, smoothMY = mouseY;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

// Stars - multiple layers for depth
const layers = [
    { count: 150, speed: 0.02, sizeRange: [0.3, 0.8], alphaRange: [0.1, 0.3] },
    { count: 80,  speed: 0.05, sizeRange: [0.6, 1.3], alphaRange: [0.2, 0.5] },
    { count: 30,  speed: 0.1,  sizeRange: [1.0, 2.0], alphaRange: [0.3, 0.7] },
];

const allStars = [];
for (const layer of layers) {
    for (let i = 0; i < layer.count; i++) {
        allStars.push({
            x: Math.random(), y: Math.random(),
            r: layer.sizeRange[0] + Math.random() * (layer.sizeRange[1] - layer.sizeRange[0]),
            a: layer.alphaRange[0] + Math.random() * (layer.alphaRange[1] - layer.alphaRange[0]),
            parallax: layer.speed,
            twinkle: Math.random() * 3 + 1,
            phase: Math.random() * Math.PI * 2,
            hue: Math.random() < 0.15 ? (Math.random() < 0.5 ? '#ffd54f' : '#96b4ff') : '#dde4f0'
        });
    }
}

// Cosmic dust particles
const dust = [];
for (let i = 0; i < 120; i++) {
    dust.push({
        x: Math.random(), y: Math.random(),
        r: Math.random() * 0.6 + 0.2,
        a: Math.random() * 0.12 + 0.02,
        drift: { x: (Math.random() - 0.5) * 0.00005, y: (Math.random() - 0.5) * 0.00005 },
        parallax: 0.03 + Math.random() * 0.05
    });
}

// Solar system - positioned off-center (bottom-right area)
const solarSystem = {
    // Position as fraction of screen
    cx: 0.65,
    cy: 0.6,
    // Overall opacity - subtle!
    opacity: 0.55,
    parallaxStrength: 25
};

const sun = { radius: 18, pulseSpeed: 0.4 };

const planets = [
    { dist: 42,  r: 2,   color: [176, 160, 144], speed: 4.0,  phase: Math.random() * Math.PI * 2, trail: 0.12 },
    { dist: 65,  r: 3,   color: [232, 199, 122], speed: 1.6,  phase: Math.random() * Math.PI * 2, trail: 0.15 },
    { dist: 90,  r: 3.2, color: [91, 155, 213],  speed: 1.0,  phase: Math.random() * Math.PI * 2, trail: 0.18 },
    { dist: 118, r: 2.6, color: [212, 113, 74],  speed: 0.52, phase: Math.random() * Math.PI * 2, trail: 0.14 },
    { dist: 165, r: 6.5, color: [212, 165, 90],  speed: 0.08, phase: Math.random() * Math.PI * 2, trail: 0.22 },
    { dist: 215, r: 5.5, color: [201, 183, 122], speed: 0.03, phase: Math.random() * Math.PI * 2, trail: 0.20, rings: true },
    { dist: 265, r: 4,   color: [126, 200, 200], speed: 0.012,phase: Math.random() * Math.PI * 2, trail: 0.16 },
    { dist: 310, r: 3.8, color: [74, 106, 212],  speed: 0.006,phase: Math.random() * Math.PI * 2, trail: 0.14 },
];

// Planet trails (store last N positions)
const trails = planets.map(() => []);

// Asteroid belt
const asteroids = [];
for (let i = 0; i < 60; i++) {
    asteroids.push({
        dist: 138 + Math.random() * 16,
        angle: Math.random() * Math.PI * 2,
        speed: 0.12 + Math.random() * 0.08,
        r: Math.random() * 0.6 + 0.2,
        a: Math.random() * 0.25 + 0.08
    });
}

// Shooting stars
const shooters = [];
let lastShoot = 0;

function hexToRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return [(n >> 16), (n >> 8) & 0xff, n & 0xff];
}

function draw(time) {
    const t = time * 0.001;
    const w = W(), h = H();
    ctx.clearRect(0, 0, w, h);

    // Smooth mouse
    smoothMX += (mouseX - smoothMX) * 0.04;
    smoothMY += (mouseY - smoothMY) * 0.04;
    const mxNorm = (smoothMX / w - 0.5) * 2; // -1 to 1
    const myNorm = (smoothMY / h - 0.5) * 2;

    // Background - deep space with subtle radial from sun position
    const scx = w * solarSystem.cx + mxNorm * solarSystem.parallaxStrength;
    const scy = h * solarSystem.cy + myNorm * solarSystem.parallaxStrength;

    const bg = ctx.createRadialGradient(scx, scy, 0, scx, scy, Math.max(w, h) * 0.8);
    bg.addColorStop(0, '#0f1428');
    bg.addColorStop(0.3, '#0a0f1e');
    bg.addColorStop(0.7, '#060910');
    bg.addColorStop(1, '#030508');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // Dust particles
    for (const d of dust) {
        d.x += d.drift.x;
        d.y += d.drift.y;
        if (d.x < 0) d.x = 1; if (d.x > 1) d.x = 0;
        if (d.y < 0) d.y = 1; if (d.y > 1) d.y = 0;
        const px = d.x * w + mxNorm * d.parallax * 40;
        const py = d.y * h + myNorm * d.parallax * 40;
        ctx.beginPath();
        ctx.arc(px, py, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180, 190, 220, ${d.a})`;
        ctx.fill();
    }

    // Stars with parallax
    for (const s of allStars) {
        const twinkle = 0.6 + 0.4 * Math.sin(t * s.twinkle + s.phase);
        const px = s.x * w + mxNorm * s.parallax * 50;
        const py = s.y * h + myNorm * s.parallax * 50;
        ctx.beginPath();
        ctx.arc(px, py, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.hue;
        ctx.globalAlpha = s.a * twinkle;
        ctx.fill();
        // Cross glint on bright stars
        if (s.r > 1.4 && twinkle > 0.8) {
            ctx.globalAlpha = (twinkle - 0.8) * 2 * s.a;
            ctx.beginPath();
            ctx.moveTo(px - s.r * 3, py);
            ctx.lineTo(px + s.r * 3, py);
            ctx.moveTo(px, py - s.r * 3);
            ctx.lineTo(px, py + s.r * 3);
            ctx.strokeStyle = s.hue;
            ctx.lineWidth = 0.4;
            ctx.stroke();
        }
    }
    ctx.globalAlpha = 1;

    // Shooting stars
    if (t - lastShoot > 6 + Math.random() * 5) {
        shooters.push({
            x: Math.random() * w * 0.6, y: Math.random() * h * 0.25,
            vx: 5 + Math.random() * 4, vy: 2 + Math.random() * 3,
            life: 1.0, len: 35 + Math.random() * 30
        });
        lastShoot = t;
    }
    for (let i = shooters.length - 1; i >= 0; i--) {
        const s = shooters[i];
        s.x += s.vx; s.y += s.vy; s.life -= 0.012;
        if (s.life <= 0) { shooters.splice(i, 1); continue; }
        const tx = s.x - s.vx * s.len * 0.12;
        const ty = s.y - s.vy * s.len * 0.12;
        const g = ctx.createLinearGradient(tx, ty, s.x, s.y);
        g.addColorStop(0, `rgba(232, 185, 49, 0)`);
        g.addColorStop(1, `rgba(255, 240, 200, ${s.life * 0.6})`);
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = g; ctx.lineWidth = 1.2; ctx.stroke();
    }

    // === Solar System ===
    ctx.save();
    ctx.globalAlpha = solarSystem.opacity;

    const cx = scx;
    const cy = scy;

    // Orbit lines
    for (const p of planets) {
        ctx.beginPath();
        ctx.arc(cx, cy, p.dist, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(100, 130, 200, 0.06)`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // Asteroid belt
    for (const a of asteroids) {
        const angle = a.angle + t * a.speed;
        const ax = cx + Math.cos(angle) * a.dist;
        const ay = cy + Math.sin(angle) * a.dist;
        ctx.beginPath();
        ctx.arc(ax, ay, a.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(140, 135, 120, ${a.a})`;
        ctx.fill();
    }

    // Planet trails + planets
    for (let i = 0; i < planets.length; i++) {
        const p = planets[i];
        const angle = p.phase + t * p.speed * 0.15;
        const px = cx + Math.cos(angle) * p.dist;
        const py = cy + Math.sin(angle) * p.dist;

        // Store trail
        trails[i].push({ x: px, y: py });
        if (trails[i].length > 30) trails[i].shift();

        // Draw trail
        if (trails[i].length > 2) {
            for (let j = 1; j < trails[i].length; j++) {
                const alpha = (j / trails[i].length) * p.trail;
                ctx.beginPath();
                ctx.moveTo(trails[i][j - 1].x, trails[i][j - 1].y);
                ctx.lineTo(trails[i][j].x, trails[i][j].y);
                ctx.strokeStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${alpha})`;
                ctx.lineWidth = p.r * 0.6;
                ctx.stroke();
            }
        }

        // Glow
        const glow = ctx.createRadialGradient(px, py, 0, px, py, p.r * 4);
        glow.addColorStop(0, `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, 0.2)`);
        glow.addColorStop(1, `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, 0)`);
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(px, py, p.r * 4, 0, Math.PI * 2); ctx.fill();

        // Planet body with lighting
        const bodyG = ctx.createRadialGradient(px - p.r * 0.3, py - p.r * 0.3, 0, px, py, p.r);
        bodyG.addColorStop(0, `rgba(${Math.min(255, p.color[0] + 40)}, ${Math.min(255, p.color[1] + 40)}, ${Math.min(255, p.color[2] + 40)}, 1)`);
        bodyG.addColorStop(1, `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, 1)`);
        ctx.fillStyle = bodyG;
        ctx.beginPath(); ctx.arc(px, py, p.r, 0, Math.PI * 2); ctx.fill();

        // Saturn rings
        if (p.rings) {
            ctx.save();
            ctx.translate(px, py);
            ctx.scale(1, 0.3);
            ctx.beginPath(); ctx.arc(0, 0, p.r * 2, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, 0.4)`;
            ctx.lineWidth = 2; ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, p.r * 2.6, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, 0.2)`;
            ctx.lineWidth = 1.5; ctx.stroke();
            ctx.restore();
        }
    }

    // Sun
    const pulse = 1 + Math.sin(t * sun.pulseSpeed) * 0.06;
    const sr = sun.radius * pulse;

    // Far glow
    const g3 = ctx.createRadialGradient(cx, cy, sr, cx, cy, sr * 8);
    g3.addColorStop(0, 'rgba(232, 185, 49, 0.1)');
    g3.addColorStop(0.5, 'rgba(232, 185, 49, 0.03)');
    g3.addColorStop(1, 'rgba(232, 185, 49, 0)');
    ctx.fillStyle = g3;
    ctx.beginPath(); ctx.arc(cx, cy, sr * 8, 0, Math.PI * 2); ctx.fill();

    // Inner glow
    const g2 = ctx.createRadialGradient(cx, cy, sr * 0.5, cx, cy, sr * 2.5);
    g2.addColorStop(0, 'rgba(255, 220, 100, 0.5)');
    g2.addColorStop(1, 'rgba(232, 185, 49, 0)');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(cx, cy, sr * 2.5, 0, Math.PI * 2); ctx.fill();

    // Core
    const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, sr);
    g1.addColorStop(0, '#fffbe8');
    g1.addColorStop(0.25, '#ffe066');
    g1.addColorStop(0.6, '#e8b931');
    g1.addColorStop(1, '#b8841a');
    ctx.fillStyle = g1;
    ctx.beginPath(); ctx.arc(cx, cy, sr, 0, Math.PI * 2); ctx.fill();

    ctx.restore();

    requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
