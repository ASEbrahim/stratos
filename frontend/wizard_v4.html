<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StratOS — Setup Wizard v4</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1724;--card:#1a2332;--card-hover:#1f2b3d;
  --accent:#10b981;--accent-dim:rgba(16,185,129,.15);--accent-glow:rgba(16,185,129,.25);
  --text:#f1f5f9;--text-dim:#94a3b8;--text-muted:#64748b;
  --border:#2a3548;--border-hover:#3a4a60;--danger:#ef4444;
  --r:14px;--rs:10px;--pill:999px;
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ═══ LAUNCHER ═══ */
.launcher{max-width:460px;margin:80px auto;padding:0 24px}
.launcher h2{font-size:21px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.launcher>p{color:var(--text-dim);font-size:14px;margin-bottom:24px;line-height:1.5}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.fi{width:100%;padding:12px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s var(--ease)}
.fi:focus{border-color:var(--accent)}.fi::placeholder{color:var(--text-muted)}
.gbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;margin-top:24px;background:var(--accent);color:#000;font-size:15px;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;transition:all .2s var(--ease)}
.gbtn:hover{background:#34d399;box-shadow:0 0 24px var(--accent-glow)}
.gbtn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;box-shadow:none}
.gbtn:active:not(:disabled){transform:scale(.98)}
.lhint{text-align:center;font-size:12px;color:var(--text-muted);margin-top:10px}

/* ═══ MODAL ═══ */
.bk{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:9998;opacity:0;pointer-events:none;transition:opacity .35s ease}
.bk.open{opacity:1;pointer-events:auto}
.modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);
  width:min(90vw,920px);max-height:85vh;height:85vh;
  background:var(--bg);border:1px solid var(--border);border-radius:20px;
  z-index:9999;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:all .35s var(--ease);overflow:hidden;
  box-shadow:0 25px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03);
}
.modal.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}

.hdr{padding:20px 36px 0;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:10px}
.brand svg{width:24px;height:24px;color:var(--accent)}
.brand span{font-size:16px;font-weight:700;letter-spacing:-.02em}
.xbtn{width:32px;height:32px;border-radius:8px;border:none;background:0;color:var(--text-muted);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease)}
.xbtn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--pill);font-size:13px;color:var(--text-dim);margin-bottom:14px}
.badge strong{color:var(--text);font-weight:600}
.prog-t{width:100%;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-f{height:100%;background:var(--accent);border-radius:3px;transition:width .5s var(--ease)}
.dots{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding-bottom:4px}
.dot{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);transition:color .2s var(--ease)}
.dot.a{color:var(--accent);font-weight:600}.dot.d{color:var(--text-dim)}
.dot-c{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s var(--ease)}
.dot.a .dot-c{border-color:var(--accent);background:var(--accent);color:#000}
.dot.d .dot-c{border-color:var(--accent);color:var(--accent)}
.conn{width:28px;height:2px;background:var(--border);border-radius:2px;transition:background .2s var(--ease)}.conn.d{background:var(--accent)}

.bod{flex:1;overflow:hidden;position:relative}
.slides{display:flex;height:100%;transition:transform .45s var(--ease)}
.sl{min-width:100%;height:100%;overflow-y:auto;padding:28px 40px 110px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sl::-webkit-scrollbar{width:5px}.sl::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.inn{max-width:820px;margin:0 auto}

.ftr{flex-shrink:0;padding:16px 36px 20px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);background:var(--bg)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:var(--pill);font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .2s var(--ease);font-family:inherit;outline:none}
.btn:active{transform:scale(.97)}
.bp{background:var(--accent);color:#000}
.bp:hover{background:#34d399;box-shadow:0 0 20px var(--accent-glow)}
.bp:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;box-shadow:none}
.bp:disabled:active{transform:none}
.bg_{background:0;color:var(--text-dim);padding:12px 16px}
.bg_:hover{color:var(--text);background:rgba(255,255,255,.05)}
.bo{background:var(--card);color:var(--text);border:1px solid var(--border);padding:12px 26px}
.bo:hover{border-color:var(--border-hover);background:var(--card-hover)}

.title{font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px}
.sub{color:var(--text-dim);font-size:15px;margin-bottom:28px;line-height:1.5}

/* ═══ STEP 1: CARD GRID ═══ */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
.gcard{
  background:var(--card);border:1.5px solid var(--border);border-radius:16px;
  cursor:pointer;transition:all .3s var(--ease);position:relative;
  user-select:none;-webkit-tap-highlight-color:transparent;overflow:hidden;
}
.gcard:hover{border-color:var(--border-hover);background:var(--card-hover);transform:translateY(-2px)}
.gcard.sel{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 24px var(--accent-glow),inset 0 0 24px rgba(16,185,129,.04);transform:translateY(0)}
.gcard.sel:hover{background:rgba(16,185,129,.18);transform:translateY(0)}
.gcard-head{padding:26px 24px 22px;display:flex;flex-direction:column}
.gcard-icon{font-size:36px;margin-bottom:14px;display:block;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
.gcard-name{font-size:17px;font-weight:700;letter-spacing:-.01em;margin-bottom:5px}
.gcard-desc{font-size:13px;color:var(--text-muted);line-height:1.45}
.gcard-chk{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.4);transition:all .3s var(--spring)}
.gcard.sel .gcard-chk{opacity:1;transform:scale(1)}
.gcard-chk svg{width:13px;height:13px;stroke:#000;stroke-width:3;fill:none}

/* Expanding body */
.gcard-body{max-height:0;opacity:0;overflow:hidden;transition:max-height .45s var(--ease),opacity .3s var(--ease),padding .3s var(--ease);padding:0 24px}
.gcard.sel .gcard-body{max-height:320px;opacity:1;padding:0 24px 22px}
.gcard-body-sep{height:1px;background:rgba(255,255,255,.06);margin-bottom:12px}
.gcard-body-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.gcard-body-hint{font-size:12px;color:var(--text-muted);font-style:italic;padding-top:4px}

/* Sub-pills inside cards — FIX #2: scrollable container */
.spills{display:flex;flex-wrap:wrap;gap:8px;max-height:96px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;padding-right:4px}
.spills::-webkit-scrollbar{width:3px}
.spills::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.sp{
  display:inline-flex;align-items:center;gap:4px;padding:8px 16px;
  border-radius:var(--pill);font-size:13px;font-weight:500;
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  cursor:pointer;transition:all .15s var(--ease);white-space:nowrap;
}
.sp:hover{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08)}
/* FIX #11: pill click animation */
.sp:active{transform:scale(.94);transition-duration:.05s}
.sp.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.sp.on:hover{background:rgba(16,185,129,.22)}
.sp-add{border-style:dashed;color:var(--text-muted);border-color:rgba(255,255,255,.1)}
.sp-add:hover{border-color:var(--accent);color:var(--accent)}
.sp-x{font-size:14px;color:var(--text-muted);margin-left:2px;transition:color .15s}
.sp-x:hover{color:var(--danger)}
.add-inp-card{background:rgba(255,255,255,.04);border:1.5px solid var(--accent);border-radius:var(--pill);padding:8px 14px;font-size:13px;color:var(--text);outline:none;font-family:inherit;width:130px;transition:all .2s var(--ease)}
.add-inp-card::placeholder{color:var(--text-muted)}
.add-inp-card:focus{box-shadow:0 0 10px var(--accent-glow)}

/* ═══ STEP 2: TAB BAR — scrollable with arrows, drag, fades ═══ */
.tab-wrap{position:relative;margin-bottom:28px}
.tab-bar{display:flex;flex-wrap:nowrap;gap:0;border-bottom:2px solid var(--border);overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none;scroll-behavior:smooth;cursor:grab;user-select:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-bar.dragging{cursor:grabbing;scroll-behavior:auto}
.tab-bar.dragging .tab{pointer-events:none}
.tab-arr{position:absolute;top:0;bottom:2px;width:36px;z-index:3;display:flex;align-items:center;justify-content:center;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;transition:all .2s var(--ease);opacity:0;pointer-events:none;font-family:inherit;line-height:1}
.tab-arr.show{opacity:1;pointer-events:auto}
.tab-arr:hover{color:var(--text)}
.tab-arr-l{left:0;background:linear-gradient(to right,var(--bg) 50%,transparent);padding-right:6px}
.tab-arr-r{right:0;background:linear-gradient(to left,var(--bg) 50%,transparent);padding-left:6px}
.tab{
  display:flex;align-items:center;gap:8px;padding:14px 24px 16px;
  font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;
  transition:all .2s var(--ease);border:none;background:none;font-family:inherit;outline:none;
  position:relative;white-space:nowrap;flex-shrink:0;
}
.tab:hover{color:var(--text-dim)}
.tab.active{color:var(--text);font-weight:600}
.tab::after{content:'';position:absolute;bottom:-2px;left:12px;right:12px;height:2px;background:var(--accent);border-radius:2px;transform:scaleX(0);transition:transform .25s var(--ease)}
.tab.active::after{transform:scaleX(1)}
.tab-icon{font-size:17px}
.tab-body{animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Step 2 sections within a tab — FIX #3, #6 */
.s2-section{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.s2-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.s2-sec-hdr{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;margin-bottom:18px}
.s2-sec-icon{font-size:18px}
.s2-label{font-size:14px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;margin-top:24px}
.s2-label:first-of-type{margin-top:0}
.s2-hint{font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted);font-size:12px}

/* ═══ PILLS ═══ */
.pills{display:flex;flex-wrap:wrap;gap:10px}
.pill{
  display:inline-flex;align-items:center;gap:6px;padding:11px 20px;
  border-radius:var(--pill);font-size:14px;font-weight:500;
  background:var(--card);border:1.5px solid var(--border);cursor:pointer;
  transition:all .15s var(--ease);user-select:none;white-space:nowrap;
}
.pill:hover{border-color:var(--border-hover);background:var(--card-hover)}
/* FIX #11 */
.pill:active:not(.pill-add){transform:scale(.94);transition-duration:.05s}
.pill.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.pill.on:hover{background:rgba(16,185,129,.22)}
.pill-x{font-size:16px;color:var(--text-muted);cursor:pointer;transition:color .15s;margin-left:2px}
.pill-x:hover{color:var(--danger)}
.pill-add{border-style:dashed;color:var(--text-muted)}
.pill-add:hover{border-color:var(--accent);color:var(--accent)}
/* FIX #7: dimmed suggestion pills */
.pill-sug{border-style:dashed;opacity:.5;transition:all .2s var(--ease)}
.pill-sug:hover{opacity:.8;border-color:var(--border-hover)}
.pill-sug.on{opacity:1;border-style:solid}
.add-inp{background:var(--card);border:1.5px solid var(--accent);border-radius:var(--pill);padding:11px 16px;font-size:14px;color:var(--text);outline:none;font-family:inherit;width:160px;transition:all .2s var(--ease)}
.add-inp::placeholder{color:var(--text-muted)}.add-inp:focus{box-shadow:0 0 12px var(--accent-glow)}

/* Interest free text input in Step 2 */
.int-wrap{display:flex;gap:10px;margin-bottom:16px}
.int-inp{flex:1;padding:12px 18px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--pill);font-size:14px;color:var(--text);outline:none;font-family:inherit;transition:all .2s var(--ease)}
.int-inp:focus{border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
.int-inp::placeholder{color:var(--text-muted)}

/* ═══ STEP 3: REVIEW — FIX #8, #9: collapsible ═══ */
.s3-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.s3-toggle{background:none;border:1px solid var(--border);border-radius:var(--pill);padding:6px 14px;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .2s var(--ease);white-space:nowrap;margin-top:6px}
.s3-toggle:hover{border-color:var(--border-hover);color:var(--text)}
.rv{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;transition:border-color .2s var(--ease);overflow:hidden}
.rv:hover{border-color:var(--border-hover)}
.rv-h{display:flex;align-items:center;gap:10px;padding:20px 24px;cursor:pointer;user-select:none;transition:background .15s var(--ease)}
.rv-h:hover{background:rgba(255,255,255,.02)}
.rv-i{font-size:22px}.rv-t{font-size:17px;font-weight:700}
.rv-chev{margin-left:auto;font-size:18px;color:var(--text-muted);transition:transform .3s var(--ease)}
.rv.collapsed .rv-chev{transform:rotate(-90deg)}
.rv-body{padding:0 24px 22px;transition:max-height .4s var(--ease),opacity .3s var(--ease),padding .3s var(--ease);max-height:2000px;opacity:1;overflow:hidden}
.rv.collapsed .rv-body{max-height:0;opacity:0;padding:0 24px}
.rv-sub{margin-top:16px}
.rv-sub:first-child{margin-top:0}
.rv-sub-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.rv-sub-icon{font-size:16px}
.rv-sub-name{font-size:14px;font-weight:600;color:var(--text-dim)}
.rv-sub-ctx{font-size:12px;color:var(--text-muted);margin-bottom:10px;line-height:1.4}
.rv-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.rv-pills{display:flex;flex-wrap:wrap;gap:8px}
.rv-p{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:var(--pill);font-size:13px;font-weight:500;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(16,185,129,.2);cursor:pointer;transition:all .2s var(--ease)}
.rv-p:hover{border-color:var(--danger);color:var(--danger);background:rgba(239,68,68,.1)}
.rv-p:hover .rv-x{opacity:1}
.rv-x{font-size:14px;opacity:0;transition:opacity .15s;margin-left:1px}
.rv-a{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:var(--pill);font-size:13px;color:var(--text-muted);border:1px dashed var(--border);cursor:pointer;transition:all .2s var(--ease);background:none;font-family:inherit}
.rv-a:hover{border-color:var(--accent);color:var(--accent)}

/* ═══ LOADING / DONE ═══ */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
.orb{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--accent),#059669);margin-bottom:26px;position:relative;animation:orba 2s ease-in-out infinite}
.orb::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid var(--accent);opacity:0;animation:ringa 2s ease-in-out infinite}
@keyframes orba{0%,100%{transform:scale(1);box-shadow:0 0 30px var(--accent-glow)}50%{transform:scale(1.06);box-shadow:0 0 50px var(--accent-glow)}}
@keyframes ringa{0%{transform:scale(.8);opacity:.5}100%{transform:scale(1.4);opacity:0}}
.ld-t{font-size:20px;font-weight:600;margin-bottom:6px}
.ld-s{font-size:14px;color:var(--text-dim)}
.ld-list{margin-top:24px;display:flex;flex-direction:column;gap:12px;text-align:left}
.ls{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-muted);transition:all .4s ease}
.ls.on{color:var(--text)}.ls.ok{color:var(--accent)}
.ls-d{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .4s ease}
.ls.on .ls-d,.ls.ok .ls-d{border-color:var(--accent);background:var(--accent)}
.ls-d svg{width:10px;height:10px;stroke:#000;stroke-width:3;fill:none;opacity:0;transition:opacity .3s}
.ls.ok .ls-d svg{opacity:1}
.ls-sp{width:5px;height:5px;border-radius:50%;background:#000;animation:spn .8s ease-in-out infinite}
.ls:not(.on) .ls-sp,.ls.ok .ls-sp{display:none}
@keyframes spn{0%,100%{opacity:.3}50%{opacity:1}}
.done{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;animation:fadeUp .5s ease}
.done-c{width:68px;height:68px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:22px;animation:pop .5s var(--spring)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.done-c svg{width:30px;height:30px;stroke:#000;stroke-width:2.5;fill:none}
.done-t{font-size:24px;font-weight:700;margin-bottom:8px}
.done-s{font-size:15px;color:var(--text-dim);margin-bottom:30px;max-width:380px;line-height:1.5}

/* ═══ DIMMED UNSELECTED CARDS ═══ */
.gcard:not(.sel){opacity:.5}
.gcard:not(.sel):hover{opacity:.82}
.gcard-tap{font-size:11px;color:var(--text-muted);text-align:center;padding:0 24px 16px;opacity:.8;letter-spacing:.01em}

/* ═══ TAB COMPLETION DOT ═══ */
.tab-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:none;flex-shrink:0;box-shadow:0 0 6px var(--accent-glow)}
.tab-dot.show{display:block}

/* ═══ CONTEXT TAGS (Step 3) ═══ */
.rv-tag{font-size:10px;color:var(--text-muted);background:rgba(255,255,255,.05);padding:2px 7px;border-radius:4px;margin-left:3px;white-space:nowrap;letter-spacing:.01em;pointer-events:none}

/* ═══ DISCOVER MORE ═══ */
.disc{background:rgba(255,255,255,.02);border:1px dashed var(--border);border-radius:var(--r);padding:22px 24px;margin-top:24px}
.disc-h{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--text-dim);margin-bottom:4px}
.disc-s{font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.5}
.disc-pills{display:flex;flex-wrap:wrap;gap:10px}
.disc-p{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--pill);font-size:13px;font-weight:500;background:rgba(255,255,255,.03);border:1.5px dashed var(--border);color:var(--text-dim);cursor:pointer;transition:all .2s var(--ease)}
.disc-p:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.disc-p.added{border-style:solid;border-color:var(--accent);color:var(--accent);background:var(--accent-dim);opacity:.55;pointer-events:none}
.disc-tag{font-size:10px;color:var(--text-muted);background:rgba(255,255,255,.05);padding:1px 6px;border-radius:4px}

/* ═══ SKIP LINK ═══ */
.skip{display:block;text-align:center;margin-top:28px;font-size:13px;color:var(--text-muted);cursor:pointer;background:none;border:none;font-family:inherit;transition:color .2s var(--ease);padding:8px}
.skip:hover{color:var(--accent);text-decoration:underline}

/* ═══ RESPONSIVE ═══ */
@media(max-width:750px){.card-grid{grid-template-columns:repeat(2,1fr)}.sl{padding:24px 24px 100px}.hdr{padding:18px 24px 0}.ftr{padding:14px 24px 18px}}
@media(max-width:540px){.modal{width:100vw;height:100vh;max-height:100vh;border-radius:0}.card-grid{grid-template-columns:1fr}.sl{padding:20px 18px 100px}.hdr{padding:16px 18px 0}.ftr{padding:12px 18px 16px}.dot>span{display:none}.tab{padding:12px 16px 14px;font-size:13px}}

    if(active.length)tabs.push({id:c.id,name:c.name,icon:c.icon,type:'category',subs:active});

/* FIX #6: merge jobhunt + intern into career_opps */
function getTabSections(tab){
  const secs=[];
  if(tab.id==='career'){
    const hasJ=tab.subs.some(s=>s.id==='jobhunt'),hasI=tab.subs.some(s=>s.id==='intern');
    if(hasJ&&hasI)secs.push({id:'career_opps',name:'Career Opportunities',icon:'🎯'});

    else if(hasI)secs.push({id:'intern',name:'Internships',icon:'🧑‍💻'});
    for(const s of tab.subs)if(s.id!=='jobhunt'&&s.id!=='intern')secs.push({id:s.id,name:s.name,icon:getSubIcon(s.id)});
  }else{
    for(const s of tab.subs)secs.push({id:s.id,name:s.name,icon:getSubIcon(s.id)});
  }
  return secs;
}

/* Same merge logic for Step 3 */
function getS3Sections(cat){

/* ── Tab scroll system: arrows, drag, fades, auto-scroll ── */
function initTabScroll(){
  const bar=document.getElementById('tab-bar');
  if(!bar)return;
  bar.addEventListener('scroll',updateTabArrows);
  // Drag-to-scroll
  let down=false,startX=0,scrollL=0,moved=false;
  bar.addEventListener('mousedown',e=>{
    if(e.target.closest('.tab-arr'))return;
    down=true;moved=false;startX=e.pageX;scrollL=bar.scrollLeft;
  });
  const stop=()=>{
    if(!down)return;down=false;bar.classList.remove('dragging');
    // If we dragged, prevent the click on the tab
    if(moved){const suppress=e=>{e.stopPropagation();e.preventDefault();};
      bar.addEventListener('click',suppress,{capture:true,once:true});
    }
  };
  bar.addEventListener('mouseup',stop);
  bar.addEventListener('mouseleave',stop);
  bar.addEventListener('mousemove',e=>{
    if(!down)return;e.preventDefault();
    const dx=e.pageX-startX;
    if(Math.abs(dx)>3){moved=true;bar.classList.add('dragging');}
    if(moved)bar.scrollLeft=scrollL-dx;
  });
  setTimeout(()=>{updateTabArrows();scrollActiveTabIntoView();},30);
}

function updateTabArrows(){
  const bar=document.getElementById('tab-bar');
  const al=document.getElementById('tab-arr-l'),ar=document.getElementById('tab-arr-r');
  if(!bar||!al||!ar)return;
  al.classList.toggle('show',bar.scrollLeft>4);
  ar.classList.toggle('show',bar.scrollLeft<bar.scrollWidth-bar.clientWidth-4);
}

function scrollTabDir(dir){
  const bar=document.getElementById('tab-bar');
  if(!bar)return;
  bar.scrollBy({left:dir*160,behavior:'smooth'});
}

function scrollActiveTabIntoView(){
  const bar=document.getElementById('tab-bar');
  if(!bar)return;
  const active=bar.querySelector('.tab.active');
  if(!active)return;
  const bRect=bar.getBoundingClientRect(),tRect=active.getBoundingClientRect();
  const pad=40;// room for arrow buttons
  if(tRect.left<bRect.left+pad)bar.scrollBy({left:tRect.left-bRect.left-pad,behavior:'smooth'});
  else if(tRect.right>bRect.right-pad)bar.scrollBy({left:tRect.right-bRect.right+pad,behavior:'smooth'});
}

function getSubIcon(sid){return PANELS[sid]?.icon||'📌';}

function renderTabBody(){

      <div class="pills">${sugH}</div>`;
    el.style.animation='none';el.offsetHeight;el.style.animation='';
    return;
  }

  /* Category tab: show sections for each active sub */
  const sections=getTabSections(tab);

  el.innerHTML=sections.map(sec=>{

    let html=multiSec?`<div class="s2-section"><div class="s2-sec-hdr"><span class="s2-sec-icon">${sec.icon}</span> ${sec.name}</div>`:'';
    html+=panel.qs.map(q=>{
      const picked=sel[q.id]||new Set();const all=[...q.pills,...(custom[q.id]||[])];
      const hint=q.hint?` <span class="s2-hint">· ${q.hint}</span>`:'';
      let h=`<div class="s2-label">${q.label}${hint}</div><div class="pills">`;
      for(const p of all){
        const isC=(custom[q.id]||[]).includes(p);
        h+=`<div class="pill ${picked.has(p)?'on':''}" onclick="togPanel('${sec.id}','${q.id}','${esc(p)}','${q.type}')">
          ${p}${isC?`<span class="pill-x" onclick="event.stopPropagation();rmPanelCustom('${sec.id}','${q.id}','${esc(p)}')">&times;</span>`:''}
        </div>`;
      }
      if(q.canAdd){
        h+=`<span id="aw-${sec.id}-${q.id}" style="display:none"><input class="add-inp" id="ai-${sec.id}-${q.id}" placeholder="Type & Enter" onkeydown="addPanelKey(event,'${sec.id}','${q.id}')"></span>`;
        h+=`<div class="pill pill-add" id="ab-${sec.id}-${q.id}" onclick="showPanelAdd('${sec.id}','${q.id}')">+ Add</div>`;
      }
      h+=`</div>`;return h;
    }).join('');
    if(multiSec)html+=`</div>`;
    return html;
  }).join('');
  el.style.animation='none';el.offsetHeight;el.style.animation='';
}

function renderGenericSection(sec){
  const custom=panelCustom[sec.id]?.kw||[];
  let html=`<div class="s2-section"><div class="s2-sec-hdr"><span class="s2-sec-icon">📌</span> ${sec.name}</div>`;
  html+=`<div class="s2-label">Keywords to track <span class="s2-hint">· Type and press Enter</span></div><div class="pills">`;

      <div class="disc-pills">${DISCOVER_MORE.map(d=>`<div class="disc-p ${discoverAdded.has(d.name)?'added':''}" onclick="discoverAdd('${esc(d.name)}','${esc(d.target)}')">${d.name}<span class="disc-tag">${d.tag}</span></div>`).join('')}</div>
    </div>`:'';

  el.innerHTML=`<div class="s3-top"><div><h1 class="title">Your intelligence profile</h1><p class="sub" style="margin-bottom:0">Generated from your choices. Tap to remove, or add your own.</p></div>${toggleBtn}</div>
    <div style="margin-top:24px">${sectionsHTML}</div>
    ${discHTML}
    <div style="display:flex;gap:12px;justify-content:center;margin-top:28px">
      <button class="btn bo" onclick="goTo(getActiveTabs().length?1:0)">← Adjust</button>
      <button class="btn bp" onclick="doBuild()">✨ Build my feed</button>
    </div>`;
}

function togRvCollapse(id){rvCollapsed.has(id)?rvCollapsed.delete(id):rvCollapsed.add(id);renderS3();}
function collapseAllRv(){for(const c of CATS)if(selCats.has(c.id))rvCollapsed.add(c.id);renderS3();}
function expandAllRv(){rvCollapsed.clear();renderS3();}

function rvRm(sid,val){rvItems[sid]=(rvItems[sid]||[]).filter(v=>v!==val);renderS3();}
function rvRmInt(val){interestTopics=interestTopics.filter(v=>v!==val);renderS3();}
function rvShowAdd(sid){
  document.getElementById('rw-'+sid).style.display='inline';
  document.getElementById('ra-'+sid).style.display='none';
  document.getElementById('ri-'+sid).focus();
}
function rvAddKey(e,sid){
  if(e.key==='Enter'&&e.target.value.trim()){
    const v=e.target.value.trim();if(!rvItems[sid])rvItems[sid]=[];if(!rvItems[sid].includes(v))rvItems[sid].push(v);
    e.target.value='';renderS3();
    setTimeout(()=>{const w=document.getElementById('rw-'+sid),a=document.getElementById('ra-'+sid),i=document.getElementById('ri-'+sid);if(w)w.style.display='inline';if(a)a.style.display='none';if(i)i.focus();},60);
  }else if(e.key==='Escape'){e.target.value='';e.target.parentElement.style.display='none';document.getElementById('ra-'+sid).style.display='';}
}

/* ═══════════════════════════════════════
   BUILD / DONE
   ═══════════════════════════════════════ */

function doBuild(){
  document.getElementById('ftr').classList.add('hidden');
  const role=document.getElementById('in-role').value.trim();
  document.getElementById('s3i').innerHTML=`<div class="ld">
    <div class="orb"></div>
    <div class="ld-t">Building your feed...</div>
    <div class="ld-s">Configuring intelligence for <strong>${role}</strong></div>
    <div class="ld-list">
      <div class="ls on" id="l0"><div class="ls-d"><div class="ls-sp"></div>${CK}</div><span>Generating context from your choices</span></div>
      <div class="ls" id="l1"><div class="ls-d"><div class="ls-sp"></div>${CK}</div><span>Building tracking categories</span></div>
      <div class="ls" id="l2"><div class="ls-d"><div class="ls-sp"></div>${CK}</div><span>Selecting news sources & scoring model</span></div>
    </div>
  </div>`;
  document.getElementById('s3').scrollTo(0,0);
  let i=0;
  const iv=setInterval(()=>{
    if(i>0){document.getElementById('l'+(i-1)).classList.remove('on');document.getElementById('l'+(i-1)).classList.add('ok');}
    if(i<3){document.getElementById('l'+i).classList.add('on');i++;}
    else{clearInterval(iv);setTimeout(showDone,400);}
  },650);
}
function showDone(){
  document.getElementById('s3i').innerHTML=`<div class="done">
    <div class="done-c">${CK.replace('viewBox','width="30" height="30" stroke="#000" stroke-width="2.5" fill="none" viewBox')}</div>
    <div class="done-t">Your feed is ready!</div>
    <div class="done-s">Your intelligence sources are configured. Your dashboard will now show signals tailored to your profile.</div>
    <button class="btn bp" onclick="closeModal()" style="padding:14px 36px;font-size:16px">Open Dashboard →</button>
  </div>`;
}

/* ═══════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════ */

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

/* Skip to quick setup — jump to Step 3 with AI defaults */
function skipToQuick(){
  selCats=new Set(DEF_CATS);
  for(const c of CATS){selSubs[c.id]=new Set(DEF_SUBS[c.id]||[]);customSubs[c.id]=[];}
  interestTopics=[];discoverAdded.clear();
  goTo(2);
}

/* Discover more — add bonus entity to its target section */
function discoverAdd(name,target){
  if(discoverAdded.has(name))return;
  discoverAdded.add(name);
  if(!rvItems[target])rvItems[target]=[];
  if(!rvItems[target].includes(name))rvItems[target].push(name);
  renderS3();
}

document.getElementById('in-role').addEventListener('input',chkLauncher);
document.getElementById('in-loc').addEventListener('input',chkLauncher);
function chkLauncher(){document.getElementById('gbtn').disabled=!document.getElementById('in-role').value.trim()||!document.getElementById('in-loc').value.trim();}

/* Keyboard shortcuts */
document.addEventListener('keydown',e=>{
  const modal=document.getElementById('modal');
  if(!modal.classList.contains('open'))return;
  const inInput=e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA';
  if(inInput){
    if(e.key==='Escape'){e.preventDefault();e.target.blur();}
    return;
  }
  if(e.key==='Enter'){e.preventDefault();goNext();}
  else if(e.key==='Escape'){e.preventDefault();if(step>0)goBack();else closeModal();}
  else if(step===0&&e.key>='1'&&e.key<='6'){
    e.preventDefault();const idx=parseInt(e.key)-1;
    if(idx<CATS.length)togCat(CATS[idx].id);
  }
});
</script>
