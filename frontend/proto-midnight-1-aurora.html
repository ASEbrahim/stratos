<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight Theme - Northern Lights</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050810; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Mouse tracking
let mouseX = -1000, mouseY = -1000;
let smoothMX = -1000, smoothMY = -1000;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('mouseleave', () => { mouseX = -1000; mouseY = -1000; });

// Stars
const stars = [];
for (let i = 0; i < 300; i++) {
    stars.push({
        x: Math.random(),
        y: Math.random(),
        r: Math.random() * 1.5 + 0.3,
        twinkleSpeed: Math.random() * 2 + 1,
        twinkleOffset: Math.random() * Math.PI * 2,
        // Blue-green tones
        color: Math.random() < 0.5
            ? [16, 185, 129]   // emerald
            : Math.random() < 0.5
                ? [52, 211, 153]   // secondary
                : [140, 200, 220]  // blue-tinted
    });
}

// Aurora curtain bands
const NUM_CURTAINS = 5;
const curtains = [];
for (let i = 0; i < NUM_CURTAINS; i++) {
    curtains.push({
        yBase: 0.28 + i * 0.025,
        amplitude: 0.015 + Math.random() * 0.02,
        frequency: 1.5 + Math.random() * 1.5,
        speed: 0.3 + Math.random() * 0.4,
        phase: Math.random() * Math.PI * 2,
        height: 0.06 + Math.random() * 0.08,
        color: i % 3 === 0
            ? [16, 185, 129]
            : i % 3 === 1
                ? [5, 150, 105]
                : [52, 211, 153],
        opacity: 0.12 + Math.random() * 0.1
    });
}

function drawBackground(t) {
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#050810');
    grd.addColorStop(0.5, '#080d18');
    grd.addColorStop(1, '#0e1026');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
}

function drawStars(t) {
    const starPositions = [];
    for (const s of stars) {
        let sx = s.x * W, sy = s.y * H;
        const dxm = sx - smoothMX, dym = sy - smoothMY;
        const distM = Math.sqrt(dxm * dxm + dym * dym);
        let alphaBoost = 0;
        if (distM < 150) {
            const push = (150 - distM) * 0.15;
            const angle = Math.atan2(dym, dxm);
            sx += Math.cos(angle) * push;
            sy += Math.sin(angle) * push;
            alphaBoost = (150 - distM) / 150 * 0.3;
        }
        const twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
        const [r, g, b] = s.color;
        ctx.beginPath();
        ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(1, twinkle * 0.7 + alphaBoost)})`;
        ctx.fill();
        starPositions.push({ x: sx, y: sy });
    }
    if (smoothMX > -500) {
        ctx.strokeStyle = 'rgba(16, 185, 129, 0.1)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < starPositions.length; i++) {
            const si = starPositions[i];
            const dxi = si.x - smoothMX, dyi = si.y - smoothMY;
            if (dxi * dxi + dyi * dyi > 120 * 120) continue;
            for (let j = i + 1; j < starPositions.length; j++) {
                const sj = starPositions[j];
                const dxj = sj.x - smoothMX, dyj = sj.y - smoothMY;
                if (dxj * dxj + dyj * dyj > 120 * 120) continue;
                const ddx = si.x - sj.x, ddy = si.y - sj.y;
                if (ddx * ddx + ddy * ddy < 100 * 100) {
                    ctx.beginPath();
                    ctx.moveTo(si.x, si.y);
                    ctx.lineTo(sj.x, sj.y);
                    ctx.stroke();
                }
            }
        }
    }
}

function drawAurora(t) {
    const centerX = 0.5;
    const auroraWidth = 0.8; // spans 80% of screen width
    const segments = 120;

    for (const c of curtains) {
        const points = [];
        const bottomPoints = [];

        for (let i = 0; i <= segments; i++) {
            const frac = i / segments;
            const x = (centerX - auroraWidth / 2 + frac * auroraWidth) * W;

            // Sine-based wave motion
            const wave = Math.sin(frac * c.frequency * Math.PI + t * c.speed + c.phase)
                       * c.amplitude * H;
            const wave2 = Math.sin(frac * c.frequency * 1.7 * Math.PI + t * c.speed * 0.7 + c.phase + 1.3)
                        * c.amplitude * H * 0.4;

            const yTop = c.yBase * H + wave + wave2;
            const yBottom = yTop + c.height * H;

            points.push({ x, y: yTop });
            bottomPoints.push({ x, y: yBottom });
        }

        // Draw curtain as gradient-filled shape
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        for (let i = bottomPoints.length - 1; i >= 0; i--) {
            ctx.lineTo(bottomPoints[i].x, bottomPoints[i].y);
        }
        ctx.closePath();

        const [cr, cg, cb] = c.color;
        // Brightness varies with time
        const brightPulse = 0.7 + 0.3 * Math.sin(t * 0.5 + c.phase);
        const opacity = c.opacity * brightPulse;

        // Vertical gradient within curtain
        const midY = (c.yBase * H + c.yBase * H + c.height * H) / 2;
        const grd = ctx.createLinearGradient(0, c.yBase * H - 20, 0, c.yBase * H + c.height * H + 40);
        grd.addColorStop(0, `rgba(${cr},${cg},${cb},0)`);
        grd.addColorStop(0.2, `rgba(${cr},${cg},${cb},${opacity * 0.7})`);
        grd.addColorStop(0.5, `rgba(${cr},${cg},${cb},${opacity})`);
        grd.addColorStop(0.8, `rgba(${cr},${cg},${cb},${opacity * 0.5})`);
        grd.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);

        ctx.fillStyle = grd;
        ctx.fill();

        // Subtle vertical ray lines within curtain
        for (let i = 0; i < segments; i += 4) {
            const frac = i / segments;
            const x = (centerX - auroraWidth / 2 + frac * auroraWidth) * W;
            const wave = Math.sin(frac * c.frequency * Math.PI + t * c.speed + c.phase) * c.amplitude * H;
            const yTop = c.yBase * H + wave;
            const yBot = yTop + c.height * H;

            const rayBright = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(frac * 8 + t * 1.2 + c.phase));

            const rayGrd = ctx.createLinearGradient(0, yTop, 0, yBot);
            rayGrd.addColorStop(0, `rgba(209,250,229,0)`);
            rayGrd.addColorStop(0.3, `rgba(209,250,229,${0.04 * rayBright})`);
            rayGrd.addColorStop(0.7, `rgba(209,250,229,${0.02 * rayBright})`);
            rayGrd.addColorStop(1, `rgba(209,250,229,0)`);

            ctx.beginPath();
            ctx.moveTo(x, yTop);
            ctx.lineTo(x, yBot);
            ctx.strokeStyle = rayGrd;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
    }

    // Bright glow at center of aurora (with parallax)
    const ppx = smoothMX > -500 ? (smoothMX / W - 0.5) * 15 : 0;
    const ppy = smoothMX > -500 ? (smoothMY / H - 0.5) * 10 : 0;
    const glowX = centerX * W + ppx;
    const glowY = 0.32 * H + ppy;
    const glowR = Math.min(W, H) * 0.25;
    const glow = ctx.createRadialGradient(glowX, glowY, 0, glowX, glowY, glowR);
    const glowPulse = 0.5 + 0.5 * Math.sin(t * 0.3);
    glow.addColorStop(0, `rgba(16,185,129,${0.08 * glowPulse})`);
    glow.addColorStop(0.5, `rgba(52,211,153,${0.04 * glowPulse})`);
    glow.addColorStop(1, 'rgba(16,185,129,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
}

function drawMouseGlow() {
    if (smoothMX > -500) {
        const glow = ctx.createRadialGradient(smoothMX, smoothMY, 0, smoothMX, smoothMY, 30);
        glow.addColorStop(0, 'rgba(16, 185, 129, 0.04)');
        glow.addColorStop(1, 'rgba(16, 185, 129, 0)');
        ctx.beginPath();
        ctx.arc(smoothMX, smoothMY, 30, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
    }
}

let startTime = null;
function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const t = (timestamp - startTime) / 1000;
    smoothMX += (mouseX - smoothMX) * 0.05;
    smoothMY += (mouseY - smoothMY) * 0.05;

    drawBackground(t);
    drawStars(t);
    drawAurora(t);
    drawMouseGlow();

    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
