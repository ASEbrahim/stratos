<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aurora — P1: Enchanted Grove</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#030907; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

// Enchanted grove — tall dark trees with glowing mushrooms at the roots,
// fireflies weaving between trunks, low mist, and a soft green moon

// Trees — layered depth, organic branching
const trees = [];
function makeTree(x, layer) {
    const scale = [0.6, 0.8, 1.0][layer];
    const h = (0.35 + Math.random() * 0.25) * scale;
    const branches = [];
    const bCount = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < bCount; i++) {
        const side = Math.random() < 0.5 ? -1 : 1;
        const startY = 0.2 + Math.random() * 0.5;
        branches.push({
            startY,
            angle: side * (0.3 + Math.random() * 0.6),
            len: (0.15 + Math.random() * 0.2) * scale,
            curve: side * (0.1 + Math.random() * 0.15),
        });
    }
    return { x, layer, h, trunkW: (4 + Math.random() * 5) * scale, branches, scale };
}
for (let i = 0; i < 4; i++) trees.push(makeTree(0.08 + Math.random() * 0.84, 0));
for (let i = 0; i < 5; i++) trees.push(makeTree(0.05 + Math.random() * 0.90, 1));
for (let i = 0; i < 4; i++) trees.push(makeTree(0.03 + Math.random() * 0.94, 2));
trees.sort((a, b) => a.layer - b.layer);

// Glowing mushrooms at tree bases
const mushrooms = [];
for (const t of trees) {
    if (t.layer < 1) continue;
    const count = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
        mushrooms.push({
            x: t.x + (Math.random() - 0.5) * 0.04,
            size: 3 + Math.random() * 5,
            glowR: 15 + Math.random() * 20,
            phase: Math.random() * Math.PI * 2,
            speed: 0.4 + Math.random() * 0.3,
            isGreen: Math.random() < 0.7,
        });
    }
}

// Fireflies
const fireflies = [];
for (let i = 0; i < 60; i++) {
    fireflies.push({
        x: Math.random(), y: 0.15 + Math.random() * 0.65,
        baseX: 0, baseY: 0,
        r: 1.0 + Math.random() * 1.5,
        phase: Math.random() * Math.PI * 2,
        glowSpeed: 0.4 + Math.random() * 0.8,
        // Figure-8 wandering
        wanderRx: 0.01 + Math.random() * 0.025,
        wanderRy: 0.005 + Math.random() * 0.015,
        wanderSpeed: 0.08 + Math.random() * 0.12,
        wanderPhase: Math.random() * Math.PI * 2,
    });
    fireflies[i].baseX = fireflies[i].x;
    fireflies[i].baseY = fireflies[i].y;
}

// Stars visible through canopy gaps
const stars = [];
for (let i = 0; i < 80; i++) {
    stars.push({
        x: Math.random(), y: Math.random() * 0.35,
        r: Math.random() * 0.8 + 0.2, a: Math.random() * 0.2 + 0.03,
        phase: Math.random() * Math.PI * 2,
    });
}

// Mist layers
const mistLayers = [];
for (let i = 0; i < 12; i++) {
    mistLayers.push({
        x: Math.random(), y: 0.65 + Math.random() * 0.15,
        w: 0.15 + Math.random() * 0.25,
        h: 0.03 + Math.random() * 0.04,
        speed: 0.008 + Math.random() * 0.012,
        a: 0.02 + Math.random() * 0.025,
        phase: Math.random() * Math.PI * 2,
    });
}

function drawTree(tree, h_, w_) {
    const x = tree.x * w_;
    const baseY = h_ * (0.84 - tree.layer * 0.02);
    const treeH = tree.h * h_;
    const topY = baseY - treeH;
    const darkness = [0.7, 0.82, 0.93][tree.layer];

    // Trunk
    ctx.strokeStyle = `rgba(2,12,6,${darkness})`;
    ctx.lineCap = 'round';
    ctx.lineWidth = tree.trunkW;
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.quadraticCurveTo(x + Math.sin(tree.x * 10) * 5, baseY - treeH * 0.5, x, topY);
    ctx.stroke();

    // Branches
    for (const b of tree.branches) {
        const sy = baseY - treeH * b.startY;
        const bx = x;
        const endX = bx + Math.sin(b.angle) * b.len * h_;
        const endY = sy - Math.cos(b.angle) * b.len * h_ * 0.5;
        const cpX = (bx + endX) / 2 + b.curve * h_ * 0.3;
        const cpY = (sy + endY) / 2 - 10;

        ctx.lineWidth = tree.trunkW * 0.45;
        ctx.beginPath();
        ctx.moveTo(bx, sy);
        ctx.quadraticCurveTo(cpX, cpY, endX, endY);
        ctx.stroke();
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = performance.now() * 0.001;
    const w = canvas.width, h = canvas.height;

    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, '#040c08');
    sky.addColorStop(0.35, '#030a06');
    sky.addColorStop(1, '#030907');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

    // Moon
    const moonX = w * 0.72, moonY = h * 0.12, moonR = 22;
    const moonGlow = ctx.createRadialGradient(moonX, moonY, moonR, moonX, moonY, moonR * 8);
    moonGlow.addColorStop(0, 'rgba(52,211,153,0.06)');
    moonGlow.addColorStop(0.3, 'rgba(52,211,153,0.025)');
    moonGlow.addColorStop(0.6, 'rgba(40,180,140,0.008)');
    moonGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = moonGlow; ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 8, 0, Math.PI * 2); ctx.fill();
    const moonBody = ctx.createRadialGradient(moonX - 3, moonY - 3, 0, moonX, moonY, moonR);
    moonBody.addColorStop(0, 'rgba(200,245,220,0.25)');
    moonBody.addColorStop(0.5, 'rgba(110,231,183,0.15)');
    moonBody.addColorStop(1, 'rgba(52,211,153,0.05)');
    ctx.fillStyle = moonBody; ctx.beginPath(); ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2); ctx.fill();

    // Stars
    for (const s of stars) {
        ctx.globalAlpha = s.a * (0.6 + 0.4 * Math.sin(t * 0.1 + s.phase));
        ctx.fillStyle = '#90c8a8';
        ctx.beginPath(); ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Trees
    for (const tree of trees) drawTree(tree, h, w);

    // Ground
    const gnd = ctx.createLinearGradient(0, h * 0.78, 0, h);
    gnd.addColorStop(0, 'transparent');
    gnd.addColorStop(0.15, 'rgba(3,12,6,0.5)');
    gnd.addColorStop(0.5, 'rgba(2,10,5,0.85)');
    gnd.addColorStop(1, 'rgba(2,8,4,0.95)');
    ctx.fillStyle = gnd; ctx.fillRect(0, h * 0.78, w, h * 0.22);

    // Mushroom glow
    for (const m of mushrooms) {
        const glow = 0.5 + 0.5 * Math.sin(t * m.speed + m.phase);
        const mx = m.x * w, my = h * 0.84;
        const cr = m.isGreen ? '52,211,153' : '56,189,248';
        const crB = m.isGreen ? '160,255,210' : '150,225,255';

        // Wide glow on ground
        const mg = ctx.createRadialGradient(mx, my, 0, mx, my, m.glowR);
        mg.addColorStop(0, `rgba(${cr},${0.08 * glow})`);
        mg.addColorStop(0.5, `rgba(${cr},${0.025 * glow})`);
        mg.addColorStop(1, 'transparent');
        ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, m.glowR, 0, Math.PI * 2); ctx.fill();

        // Mushroom cap
        ctx.fillStyle = `rgba(${crB},${0.25 * glow})`;
        ctx.beginPath();
        ctx.ellipse(mx, my - m.size * 0.8, m.size, m.size * 0.5, 0, Math.PI, 0);
        ctx.fill();
        // Stem
        ctx.fillStyle = `rgba(${cr},${0.12 * glow})`;
        ctx.fillRect(mx - 1, my - m.size * 0.7, 2, m.size * 0.7);
    }

    // Mist
    for (const ml of mistLayers) {
        ml.x += ml.speed * 0.01;
        if (ml.x > 1.3) ml.x = -0.3;
        const breathe = 0.6 + 0.4 * Math.sin(t * 0.15 + ml.phase);
        const mx = ml.x * w, my = ml.y * h;
        const mw = ml.w * w, mh = ml.h * h;
        const mg = ctx.createRadialGradient(mx, my, 0, mx, my, mw);
        mg.addColorStop(0, `rgba(52,211,153,${ml.a * breathe})`);
        mg.addColorStop(0.4, `rgba(40,180,140,${ml.a * breathe * 0.4})`);
        mg.addColorStop(1, 'transparent');
        ctx.fillStyle = mg;
        ctx.fillRect(mx - mw, my - mh, mw * 2, mh * 2);
    }

    // Fireflies
    for (const f of fireflies) {
        // Figure-8 wander
        const wp = t * f.wanderSpeed + f.wanderPhase;
        f.x = f.baseX + Math.sin(wp) * f.wanderRx;
        f.y = f.baseY + Math.sin(wp * 2) * f.wanderRy;

        const rawGlow = Math.sin(t * f.glowSpeed + f.phase);
        const glow = Math.pow(Math.max(0, rawGlow), 1.5);
        if (glow < 0.03) continue;

        const fx = f.x * w, fy = f.y * h;

        // Halo
        ctx.globalAlpha = glow;
        const halo = ctx.createRadialGradient(fx, fy, 0, fx, fy, f.r * 15);
        halo.addColorStop(0, 'rgba(110,231,183,0.10)');
        halo.addColorStop(0.3, 'rgba(52,211,153,0.035)');
        halo.addColorStop(1, 'transparent');
        ctx.fillStyle = halo;
        ctx.beginPath(); ctx.arc(fx, fy, f.r * 15, 0, Math.PI * 2); ctx.fill();

        // Core
        const core = ctx.createRadialGradient(fx, fy, 0, fx, fy, f.r * 2);
        core.addColorStop(0, `rgba(230,255,240,${glow * 0.85})`);
        core.addColorStop(0.4, `rgba(110,231,183,${glow * 0.5})`);
        core.addColorStop(1, 'transparent');
        ctx.fillStyle = core;
        ctx.beginPath(); ctx.arc(fx, fy, f.r * 2, 0, Math.PI * 2); ctx.fill();
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
