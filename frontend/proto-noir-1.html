<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Noir — P1: Pulsar</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#050506; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

// Pulsar — compact neutron star with twin sweeping beams,
// orbiting particles, magnetic field lines, and pulsed glow rings

const PULSAR_CX = 0.5, PULSAR_CY = 0.32;
const PULSAR_R = 14;
const BEAM_SPEED = 0.4; // rotation speed
const BEAM_LEN = 0.7; // fraction of screen

// Orbiting magnetosphere particles
const magParticles = [];
for (let i = 0; i < 200; i++) {
    const band = Math.random();
    const dist = 30 + band * 200;
    magParticles.push({
        angle: Math.random() * Math.PI * 2,
        dist,
        speed: (0.03 + Math.random() * 0.05) * (100 / (dist + 20)),
        r: Math.random() * 1.0 + 0.3,
        a: Math.random() * 0.35 + 0.08,
        yOff: (Math.random() - 0.5) * 3,
        colorType: band < 0.35 ? 0 : band < 0.65 ? 1 : 2,
    });
}
const magColors = [[167,139,250],[192,132,252],[139,92,246]];

// Stars
const stars = [];
for (let i = 0; i < 150; i++) {
    stars.push({
        x: Math.random(), y: Math.random(),
        r: Math.random() * 0.8 + 0.2,
        a: Math.random() * 0.2 + 0.04,
        phase: Math.random() * Math.PI * 2,
        c: Math.random() < 0.3 ? '167,139,250' : Math.random() < 0.5 ? '192,132,252' : '200,200,210',
    });
}

const TILT = 0.35;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = performance.now() * 0.001;
    const w = canvas.width, h = canvas.height;
    const cx = PULSAR_CX * w, cy = PULSAR_CY * h;

    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, '#050506');
    sky.addColorStop(0.5, '#0f0a24');
    sky.addColorStop(1, '#050506');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

    // Stars
    for (const s of stars) {
        ctx.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(t * 0.08 + s.phase));
        ctx.fillStyle = `rgba(${s.c},0.9)`;
        ctx.beginPath(); ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Beam rotation angle
    const beamAngle = t * BEAM_SPEED;
    const beamLen = Math.max(w, h) * BEAM_LEN;

    // Draw twin beams (opposite directions)
    for (let b = 0; b < 2; b++) {
        const bAng = beamAngle + b * Math.PI;
        const bx = Math.cos(bAng);
        const by = Math.sin(bAng);

        // Beam cone — wider at the end
        for (let layer = 0; layer < 4; layer++) {
            const spread = [0.03, 0.06, 0.1, 0.16][layer];
            const alpha = [0.12, 0.06, 0.03, 0.015][layer];

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            const perpX = -by, perpY = bx;
            const endX = cx + bx * beamLen;
            const endY = cy + by * beamLen;
            const spreadDist = beamLen * spread;

            ctx.lineTo(endX + perpX * spreadDist, endY + perpY * spreadDist);
            ctx.lineTo(endX - perpX * spreadDist, endY - perpY * spreadDist);
            ctx.closePath();

            const beamGrad = ctx.createLinearGradient(cx, cy, endX, endY);
            beamGrad.addColorStop(0, `rgba(192,132,252,${alpha * 1.5})`);
            beamGrad.addColorStop(0.1, `rgba(167,139,250,${alpha})`);
            beamGrad.addColorStop(0.5, `rgba(139,92,246,${alpha * 0.5})`);
            beamGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = beamGrad;
            ctx.fill();
        }
    }

    // Magnetic field line rings (tilted)
    ctx.save(); ctx.translate(cx, cy); ctx.scale(1, TILT);
    for (let ring = 0; ring < 4; ring++) {
        const rd = 40 + ring * 35;
        const alpha = 0.035 - ring * 0.006;
        ctx.beginPath(); ctx.arc(0, 0, rd, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(167,139,250,${alpha})`; ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.restore();

    // Back magnetosphere particles
    const proj = [];
    for (const p of magParticles) {
        const a = p.angle + t * p.speed;
        const px = cx + Math.cos(a) * p.dist;
        const py = cy + Math.sin(a) * p.dist * TILT + p.yOff;
        const depth = Math.sin(a);
        proj.push({ x: px, y: py, d: depth, r: p.r, a: p.a, ct: p.colorType });
    }
    proj.sort((a, b) => a.d - b.d);

    for (const p of proj) {
        if (p.d > 0.1) continue;
        const c = magColors[p.ct];
        ctx.globalAlpha = p.a * (0.5 + p.d * 0.5);
        ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }

    // Pulsar core
    const pulse = 1 + Math.sin(t * 2) * 0.15;
    const pr = PULSAR_R * pulse;

    // Wide glow
    const outerG = ctx.createRadialGradient(cx, cy, 0, cx, cy, pr * 10);
    outerG.addColorStop(0, 'rgba(167,139,250,0.08)');
    outerG.addColorStop(0.2, 'rgba(139,92,246,0.04)');
    outerG.addColorStop(0.5, 'rgba(99,102,241,0.015)');
    outerG.addColorStop(1, 'transparent');
    ctx.globalAlpha = 1;
    ctx.fillStyle = outerG; ctx.beginPath(); ctx.arc(cx, cy, pr * 10, 0, Math.PI * 2); ctx.fill();

    // Pulsing rings
    for (let i = 0; i < 3; i++) {
        const ringT = (t * 0.8 + i * 0.7) % 3.0;
        const ringR = pr + ringT * 40;
        const ringA = Math.max(0, 0.15 * (1 - ringT / 3.0));
        if (ringA < 0.005) continue;
        ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(192,132,252,${ringA})`; ctx.lineWidth = 2; ctx.stroke();
    }

    // Inner glow
    const innerG = ctx.createRadialGradient(cx, cy, 0, cx, cy, pr * 3);
    innerG.addColorStop(0, `rgba(230,220,255,${0.3 * pulse})`);
    innerG.addColorStop(0.3, `rgba(192,132,252,${0.15 * pulse})`);
    innerG.addColorStop(0.7, `rgba(139,92,246,${0.04 * pulse})`);
    innerG.addColorStop(1, 'transparent');
    ctx.fillStyle = innerG; ctx.beginPath(); ctx.arc(cx, cy, pr * 3, 0, Math.PI * 2); ctx.fill();

    // Core body
    const coreG = ctx.createRadialGradient(cx, cy, 0, cx, cy, pr);
    coreG.addColorStop(0, 'rgba(240,235,255,0.6)');
    coreG.addColorStop(0.4, 'rgba(192,132,252,0.4)');
    coreG.addColorStop(0.8, 'rgba(139,92,246,0.2)');
    coreG.addColorStop(1, 'rgba(99,102,241,0.05)');
    ctx.fillStyle = coreG; ctx.beginPath(); ctx.arc(cx, cy, pr, 0, Math.PI * 2); ctx.fill();

    // Front magnetosphere particles
    for (const p of proj) {
        if (p.d <= 0.1) continue;
        const c = magColors[p.ct];
        const da = p.a * (0.6 + p.d * 0.4);
        ctx.globalAlpha = da;
        if (p.ct === 0 && p.r > 0.7) {
            const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
            pg.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${da * 0.2})`);
            pg.addColorStop(1, 'transparent');
            ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
