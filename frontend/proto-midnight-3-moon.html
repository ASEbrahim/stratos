<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight Theme - Crescent Moon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050810; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Mouse tracking
let mouseX = -1000, mouseY = -1000;
let smoothMX = -1000, smoothMY = -1000;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('mouseleave', () => { mouseX = -1000; mouseY = -1000; });

// Stars - denser near center moon position
const stars = [];
for (let i = 0; i < 400; i++) {
    const x = Math.random();
    const y = Math.random();
    // Distance from moon center (0.5, 0.32)
    const dx = x - 0.5;
    const dy = y - 0.32;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // More likely to keep stars near the moon
    if (dist > 0.3 && Math.random() > 0.4) continue;

    stars.push({
        x, y,
        r: Math.random() * 1.3 + 0.3,
        twinkleSpeed: Math.random() * 2.5 + 0.8,
        twinkleOffset: Math.random() * Math.PI * 2,
        color: Math.random() < 0.4
            ? [16, 185, 129]
            : Math.random() < 0.5
                ? [52, 211, 153]
                : [150, 200, 220]
    });
}

// Cloud wisps
const clouds = [];
for (let i = 0; i < 8; i++) {
    clouds.push({
        x: Math.random() * 2 - 0.5,
        y: 0.2 + Math.random() * 0.25,
        width: 0.15 + Math.random() * 0.2,
        height: 0.01 + Math.random() * 0.02,
        speed: 0.003 + Math.random() * 0.005,
        opacity: 0.02 + Math.random() * 0.04,
        phase: Math.random() * Math.PI * 2
    });
}

// Firefly particles
const fireflies = [];
for (let i = 0; i < 25; i++) {
    fireflies.push({
        x: 0.3 + Math.random() * 0.4,
        y: 0.2 + Math.random() * 0.25,
        vx: (Math.random() - 0.5) * 0.0003,
        vy: (Math.random() - 0.5) * 0.0003,
        r: 1 + Math.random() * 2,
        pulseSpeed: Math.random() * 2 + 1,
        pulseOffset: Math.random() * Math.PI * 2,
        glowSize: 8 + Math.random() * 12
    });
}

// Crater positions on moon (relative to moon center, normalized)
const craters = [];
for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 0.8;
    craters.push({
        rx: Math.cos(angle) * dist,
        ry: Math.sin(angle) * dist,
        size: 0.03 + Math.random() * 0.08,
        depth: 0.3 + Math.random() * 0.5
    });
}

// Moon params
const MOON_X = 0.5;
const MOON_Y = 0.32;
const MOON_RADIUS_FACTOR = 0.06; // fraction of min(W,H)

function drawBackground(t) {
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#050810');
    grd.addColorStop(0.4, '#080d18');
    grd.addColorStop(1, '#0e1026');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
}

function drawStars(t) {
    const moonR = Math.min(W, H) * MOON_RADIUS_FACTOR;
    const mx = MOON_X * W;
    const my = MOON_Y * H;
    const starPositions = [];

    for (const s of stars) {
        let sx = s.x * W;
        let sy = s.y * H;
        const dx = sx - mx;
        const dy = sy - my;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < moonR * 1.2) continue;

        const dxm = sx - smoothMX, dym = sy - smoothMY;
        const distM = Math.sqrt(dxm * dxm + dym * dym);
        let alphaBoost = 0;
        if (distM < 150) {
            const push = (150 - distM) * 0.15;
            const angle = Math.atan2(dym, dxm);
            sx += Math.cos(angle) * push;
            sy += Math.sin(angle) * push;
            alphaBoost = (150 - distM) / 150 * 0.3;
        }

        const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
        const [r, g, b] = s.color;
        ctx.beginPath();
        ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(1, twinkle * 0.7 + alphaBoost)})`;
        ctx.fill();
        starPositions.push({ x: sx, y: sy });
    }
    if (smoothMX > -500) {
        ctx.strokeStyle = 'rgba(16, 185, 129, 0.1)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < starPositions.length; i++) {
            const si = starPositions[i];
            const dxi = si.x - smoothMX, dyi = si.y - smoothMY;
            if (dxi * dxi + dyi * dyi > 120 * 120) continue;
            for (let j = i + 1; j < starPositions.length; j++) {
                const sj = starPositions[j];
                const dxj = sj.x - smoothMX, dyj = sj.y - smoothMY;
                if (dxj * dxj + dyj * dyj > 120 * 120) continue;
                const ddx = si.x - sj.x, ddy = si.y - sj.y;
                if (ddx * ddx + ddy * ddy < 100 * 100) {
                    ctx.beginPath();
                    ctx.moveTo(si.x, si.y);
                    ctx.lineTo(sj.x, sj.y);
                    ctx.stroke();
                }
            }
        }
    }
}

function drawMoonHalo(t) {
    const ppx = smoothMX > -500 ? (smoothMX / W - 0.5) * 15 : 0;
    const ppy = smoothMX > -500 ? (smoothMY / H - 0.5) * 10 : 0;
    const mx = MOON_X * W + ppx;
    const my = MOON_Y * H + ppy;
    const moonR = Math.min(W, H) * MOON_RADIUS_FACTOR;

    // Outer halo - emerald-tinged moonlight
    const haloR = moonR * 5;
    const pulse = 0.85 + 0.15 * Math.sin(t * 0.4);

    const halo = ctx.createRadialGradient(mx, my, moonR * 0.8, mx, my, haloR);
    halo.addColorStop(0, `rgba(16,185,129,${0.12 * pulse})`);
    halo.addColorStop(0.2, `rgba(16,185,129,${0.06 * pulse})`);
    halo.addColorStop(0.4, `rgba(52,211,153,${0.03 * pulse})`);
    halo.addColorStop(0.7, `rgba(5,150,105,${0.01 * pulse})`);
    halo.addColorStop(1, 'rgba(5,150,105,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(mx, my, haloR, 0, Math.PI * 2);
    ctx.fill();

    // Inner glow ring
    const innerHaloR = moonR * 2.5;
    const innerHalo = ctx.createRadialGradient(mx, my, moonR, mx, my, innerHaloR);
    innerHalo.addColorStop(0, `rgba(209,250,229,${0.1 * pulse})`);
    innerHalo.addColorStop(0.5, `rgba(16,185,129,${0.04 * pulse})`);
    innerHalo.addColorStop(1, 'rgba(16,185,129,0)');
    ctx.fillStyle = innerHalo;
    ctx.beginPath();
    ctx.arc(mx, my, innerHaloR, 0, Math.PI * 2);
    ctx.fill();
}

function drawClouds(t) {
    for (const c of clouds) {
        c.x += c.speed * 0.016;
        if (c.x > 1.5) c.x = -0.5;

        const cx = c.x * W;
        const cy = c.y * H + Math.sin(t * 0.2 + c.phase) * 5;
        const cw = c.width * W;
        const ch = c.height * H;

        const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, cw / 2);
        const opacityMod = 0.7 + 0.3 * Math.sin(t * 0.3 + c.phase);
        grd.addColorStop(0, `rgba(100,140,160,${c.opacity * opacityMod})`);
        grd.addColorStop(0.5, `rgba(80,120,140,${c.opacity * opacityMod * 0.5})`);
        grd.addColorStop(1, 'rgba(80,120,140,0)');

        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.ellipse(cx, cy, cw / 2, ch * 3, 0, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawFireflies(t) {
    for (const f of fireflies) {
        // Gentle wandering motion
        f.x += f.vx + Math.sin(t * 0.7 + f.pulseOffset) * 0.00005;
        f.y += f.vy + Math.cos(t * 0.5 + f.pulseOffset) * 0.00005;

        // Keep in bounds near moon
        if (f.x < 0.25 || f.x > 0.75) f.vx *= -1;
        if (f.y < 0.15 || f.y > 0.5) f.vy *= -1;

        const fx = f.x * W;
        const fy = f.y * H;
        const pulse = 0.2 + 0.8 * Math.max(0, Math.sin(t * f.pulseSpeed + f.pulseOffset));

        // Glow
        const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, f.glowSize);
        glow.addColorStop(0, `rgba(16,185,129,${0.4 * pulse})`);
        glow.addColorStop(0.4, `rgba(52,211,153,${0.15 * pulse})`);
        glow.addColorStop(1, 'rgba(52,211,153,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(fx, fy, f.glowSize, 0, Math.PI * 2);
        ctx.fill();

        // Core
        ctx.beginPath();
        ctx.arc(fx, fy, f.r * pulse, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(209,250,229,${0.8 * pulse})`;
        ctx.fill();
    }
}

function drawMoon(t) {
    const ppx = smoothMX > -500 ? (smoothMX / W - 0.5) * 15 : 0;
    const ppy = smoothMX > -500 ? (smoothMY / H - 0.5) * 10 : 0;
    const mx = MOON_X * W + ppx;
    const my = MOON_Y * H + ppy;
    const moonR = Math.min(W, H) * MOON_RADIUS_FACTOR;

    ctx.save();

    // Full circle for the dark side (faintly visible)
    ctx.beginPath();
    ctx.arc(mx, my, moonR, 0, Math.PI * 2);
    const darkGrd = ctx.createRadialGradient(mx, my, 0, mx, my, moonR);
    darkGrd.addColorStop(0, 'rgba(14,16,38,0.6)');
    darkGrd.addColorStop(0.8, 'rgba(14,16,38,0.4)');
    darkGrd.addColorStop(1, 'rgba(14,16,38,0.2)');
    ctx.fillStyle = darkGrd;
    ctx.fill();

    // Faint outline of full circle (dark side edge)
    ctx.beginPath();
    ctx.arc(mx, my, moonR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(16,185,129,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Crescent: lit portion
    // Using composite: draw full moon, then cut out shadow circle offset to the right
    // Crescent facing left (shadow circle offset to the right)
    ctx.save();
    ctx.beginPath();
    ctx.arc(mx, my, moonR, 0, Math.PI * 2);
    ctx.clip();

    // Lit surface
    const litGrd = ctx.createRadialGradient(mx - moonR * 0.3, my, moonR * 0.2, mx, my, moonR);
    litGrd.addColorStop(0, 'rgba(209,250,229,0.9)');
    litGrd.addColorStop(0.3, 'rgba(209,250,229,0.7)');
    litGrd.addColorStop(0.7, 'rgba(180,230,210,0.5)');
    litGrd.addColorStop(1, 'rgba(16,185,129,0.3)');
    ctx.fillStyle = litGrd;
    ctx.fillRect(mx - moonR, my - moonR, moonR * 2, moonR * 2);

    // Crater textures on lit portion
    for (const cr of craters) {
        const crx = mx + cr.rx * moonR;
        const cry = my + cr.ry * moonR;
        const crs = cr.size * moonR;

        ctx.beginPath();
        ctx.arc(crx, cry, crs, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(14,16,38,${cr.depth * 0.15})`;
        ctx.fill();

        // Crater rim highlight
        ctx.beginPath();
        ctx.arc(crx - crs * 0.2, cry - crs * 0.2, crs * 0.9, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(209,250,229,${cr.depth * 0.05})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // Shadow circle to create crescent (offset to the right)
    const shadowOffset = moonR * 0.55;
    ctx.beginPath();
    ctx.arc(mx + shadowOffset, my, moonR * 0.9, 0, Math.PI * 2);
    ctx.fillStyle = '#050810'; // match background
    ctx.fill();

    // Subtle gradient on shadow edge for smooth transition
    const edgeGrd = ctx.createRadialGradient(mx + shadowOffset, my, moonR * 0.75, mx + shadowOffset, my, moonR * 0.95);
    edgeGrd.addColorStop(0, 'rgba(5,8,16,0.9)');
    edgeGrd.addColorStop(1, 'rgba(5,8,16,0)');
    ctx.fillStyle = edgeGrd;
    ctx.beginPath();
    ctx.arc(mx + shadowOffset, my, moonR * 0.95, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Bright edge glow on crescent
    ctx.beginPath();
    ctx.arc(mx, my, moonR + 2, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(209,250,229,0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
}

function drawMouseGlow() {
    if (smoothMX > -500) {
        const glow = ctx.createRadialGradient(smoothMX, smoothMY, 0, smoothMX, smoothMY, 30);
        glow.addColorStop(0, 'rgba(16, 185, 129, 0.04)');
        glow.addColorStop(1, 'rgba(16, 185, 129, 0)');
        ctx.beginPath();
        ctx.arc(smoothMX, smoothMY, 30, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
    }
}

let startTime = null;
function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const t = (timestamp - startTime) / 1000;
    smoothMX += (mouseX - smoothMX) * 0.05;
    smoothMY += (mouseY - smoothMY) * 0.05;

    drawBackground(t);
    drawStars(t);
    drawMoonHalo(t);
    drawClouds(t);
    drawFireflies(t);
    drawMoon(t);
    drawMouseGlow();

    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
