<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noir Theme - Pendulum</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050506; overflow: hidden; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', resize);

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// Mouse tracking
let mouseX = -1000, mouseY = -1000;
let smoothMX = -1000, smoothMY = -1000;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('mouseleave', () => { mouseX = -1000; mouseY = -1000; });

// Stars
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.5 + 0.3,
    twinkleSpeed: Math.random() * 0.02 + 0.005,
    twinkleOffset: Math.random() * Math.PI * 2,
    color: ['#a78bfa', '#8b5cf6', '#c4b5fd', '#e8e0ff'][Math.floor(Math.random() * 4)]
  });
}

// Roman numeral fragments
const numerals = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X', 'XI', 'XII'];
const floatingNumerals = [];
for (let i = 0; i < 14; i++) {
  floatingNumerals.push({
    text: numerals[Math.floor(Math.random() * numerals.length)],
    x: Math.random() * 0.4 - 0.2,  // relative to center
    y: Math.random() * 0.3 - 0.15,
    vx: (Math.random() - 0.5) * 0.1,
    vy: (Math.random() - 0.5) * 0.06,
    alpha: Math.random() * 0.15 + 0.03,
    size: Math.random() * 14 + 8,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.005
  });
}

// Afterimage trail positions
const trailPositions = [];
const maxTrail = 20;

// Ripple waves
const ripples = [];

function drawBackground(t) {
  const w = W(), h = H();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#0f0a24');
  grad.addColorStop(1, '#050506');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

function drawStars(t) {
  const w = W(), h = H();
  const starPositions = [];
  for (const s of stars) {
    let sx = s.x * w, sy = s.y * h;
    const dxm = sx - smoothMX, dym = sy - smoothMY;
    const distM = Math.sqrt(dxm * dxm + dym * dym);
    let alphaBoost = 0;
    if (distM < 150) {
      const push = (150 - distM) * 0.15;
      const angle = Math.atan2(dym, dxm);
      sx += Math.cos(angle) * push;
      sy += Math.sin(angle) * push;
      alphaBoost = (150 - distM) / 150 * 0.3;
    }
    const alpha = Math.min(1, 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset)) + alphaBoost);
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    starPositions.push({ x: sx, y: sy });
  }
  ctx.globalAlpha = 1;
  if (smoothMX > -500) {
    ctx.strokeStyle = 'rgba(167, 139, 250, 0.1)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < starPositions.length; i++) {
      const si = starPositions[i];
      const dxi = si.x - smoothMX, dyi = si.y - smoothMY;
      if (dxi * dxi + dyi * dyi > 120 * 120) continue;
      for (let j = i + 1; j < starPositions.length; j++) {
        const sj = starPositions[j];
        const dxj = sj.x - smoothMX, dyj = sj.y - smoothMY;
        if (dxj * dxj + dyj * dyj > 120 * 120) continue;
        const ddx = si.x - sj.x, ddy = si.y - sj.y;
        if (ddx * ddx + ddy * ddy < 100 * 100) {
          ctx.beginPath();
          ctx.moveTo(si.x, si.y);
          ctx.lineTo(sj.x, sj.y);
          ctx.stroke();
        }
      }
    }
  }
}

function drawGear(cx, cy, innerR, outerR, teeth, rotation, alpha) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.beginPath();

  const step = Math.PI * 2 / teeth;
  const toothDepth = outerR - innerR;

  for (let i = 0; i < teeth; i++) {
    const a = i * step;
    const a1 = a + step * 0.1;
    const a2 = a + step * 0.4;
    const a3 = a + step * 0.6;
    const a4 = a + step * 0.9;

    ctx.lineTo(Math.cos(a) * innerR, Math.sin(a) * innerR);
    ctx.lineTo(Math.cos(a1) * outerR, Math.sin(a1) * outerR);
    ctx.lineTo(Math.cos(a2) * outerR, Math.sin(a2) * outerR);
    ctx.lineTo(Math.cos(a3) * innerR, Math.sin(a3) * innerR);
    ctx.lineTo(Math.cos(a4) * innerR, Math.sin(a4) * innerR);
  }

  ctx.closePath();
  ctx.strokeStyle = `rgba(167, 139, 250, ${alpha})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Center hole
  ctx.beginPath();
  ctx.arc(0, 0, innerR * 0.3, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(196, 181, 253, ${alpha * 0.7})`;
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Spokes
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * innerR * 0.3, Math.sin(a) * innerR * 0.3);
    ctx.lineTo(Math.cos(a) * innerR * 0.85, Math.sin(a) * innerR * 0.85);
    ctx.strokeStyle = `rgba(196, 181, 253, ${alpha * 0.4})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  ctx.restore();
}

function drawMouseGlow() {
  if (smoothMX > -500) {
    const glow = ctx.createRadialGradient(smoothMX, smoothMY, 0, smoothMX, smoothMY, 30);
    glow.addColorStop(0, 'rgba(167, 139, 250, 0.05)');
    glow.addColorStop(1, 'rgba(167, 139, 250, 0)');
    ctx.beginPath();
    ctx.arc(smoothMX, smoothMY, 30, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }
}

function drawPendulum(t) {
  const w = W(), h = H();
  const px = (smoothMX / w - 0.5) * 15;
  const py = (smoothMY / h - 0.5) * 10;
  const cx = w * 0.5 + (smoothMX > -500 ? px : 0);
  const cy = h * 0.32 + (smoothMX > -500 ? py : 0);
  const time = t * 0.001;

  // Pendulum physics
  const pendulumLen = 100;
  const maxAngle = 0.45;
  const swingSpeed = 1.2;
  const angle = maxAngle * Math.sin(time * swingSpeed);
  const angularVel = maxAngle * swingSpeed * Math.cos(time * swingSpeed);

  // Pivot point (above center, where clockwork sits)
  const pivotX = cx;
  const pivotY = cy - 50;

  // Bob position
  const bobX = pivotX + Math.sin(angle) * pendulumLen;
  const bobY = pivotY + Math.cos(angle) * pendulumLen;

  // Clock face tick marks
  const clockRadius = 70;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const innerTick = clockRadius - 8;
    const outerTick = clockRadius;
    const tickAlpha = 0.1 + 0.08 * Math.sin(time * 2 + i * 0.5);

    ctx.beginPath();
    ctx.moveTo(pivotX + Math.cos(a) * innerTick, pivotY + Math.sin(a) * innerTick);
    ctx.lineTo(pivotX + Math.cos(a) * outerTick, pivotY + Math.sin(a) * outerTick);
    ctx.strokeStyle = `rgba(196, 181, 253, ${tickAlpha})`;
    ctx.lineWidth = i % 3 === 0 ? 2 : 1;
    ctx.stroke();

    // Small dot at each mark
    ctx.beginPath();
    ctx.arc(pivotX + Math.cos(a) * outerTick, pivotY + Math.sin(a) * outerTick, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(167, 139, 250, ${tickAlpha + 0.05})`;
    ctx.fill();
  }

  // Sub-tick marks (60 positions)
  for (let i = 0; i < 60; i++) {
    if (i % 5 === 0) continue;
    const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const tickAlpha = 0.04 + 0.03 * Math.sin(time * 1.5 + i * 0.3);

    ctx.beginPath();
    ctx.moveTo(pivotX + Math.cos(a) * (clockRadius - 3), pivotY + Math.sin(a) * (clockRadius - 3));
    ctx.lineTo(pivotX + Math.cos(a) * clockRadius, pivotY + Math.sin(a) * clockRadius);
    ctx.strokeStyle = `rgba(139, 92, 246, ${tickAlpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Floating roman numerals
  for (const n of floatingNumerals) {
    n.x += n.vx * 0.001;
    n.y += n.vy * 0.001;
    n.rotation += n.rotSpeed;

    // Gentle boundary wrapping
    if (Math.abs(n.x) > 0.3) n.vx *= -1;
    if (Math.abs(n.y) > 0.25) n.vy *= -1;

    const nx = cx + n.x * w;
    const ny = cy + n.y * h;

    ctx.save();
    ctx.translate(nx, ny);
    ctx.rotate(n.rotation);
    ctx.font = `${n.size}px "Times New Roman", serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(167, 139, 250, ${n.alpha})`;
    ctx.fillText(n.text, 0, 0);
    ctx.restore();
  }

  // Clockwork gears
  const gearSpeed = time * 0.8;
  drawGear(pivotX - 20, pivotY - 10, 14, 19, 8, gearSpeed, 0.2);
  drawGear(pivotX + 18, pivotY - 8, 10, 14, 6, -gearSpeed * 1.33, 0.18);
  drawGear(pivotX + 5, pivotY - 25, 8, 11, 7, gearSpeed * 1.14, 0.15);
  drawGear(pivotX - 12, pivotY + 8, 6, 9, 5, -gearSpeed * 1.6, 0.12);

  // Swing ripple waves
  // Emit ripple at extremes of swing
  if (Math.abs(angularVel) < 0.1 && ripples.length < 8) {
    if (!ripples.length || ripples[ripples.length - 1].radius > 15) {
      ripples.push({ x: bobX, y: bobY, radius: 5, alpha: 0.3 });
    }
  }

  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.radius += 0.8;
    r.alpha -= 0.003;
    if (r.alpha <= 0) { ripples.splice(i, 1); continue; }

    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(167, 139, 250, ${r.alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Afterimage trail
  trailPositions.push({ x: bobX, y: bobY });
  if (trailPositions.length > maxTrail) trailPositions.shift();

  for (let i = 0; i < trailPositions.length - 1; i++) {
    const p = trailPositions[i];
    const alpha = (i / trailPositions.length) * 0.3;
    const size = 6 + (i / trailPositions.length) * 6;

    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size);
    glow.addColorStop(0, `rgba(139, 92, 246, ${alpha})`);
    glow.addColorStop(1, 'rgba(139, 92, 246, 0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  // Pendulum rod
  ctx.beginPath();
  ctx.moveTo(pivotX, pivotY);
  ctx.lineTo(bobX, bobY);
  ctx.strokeStyle = 'rgba(196, 181, 253, 0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Rod faint glow
  ctx.beginPath();
  ctx.moveTo(pivotX, pivotY);
  ctx.lineTo(bobX, bobY);
  ctx.strokeStyle = 'rgba(167, 139, 250, 0.08)';
  ctx.lineWidth = 5;
  ctx.stroke();

  // Pivot point
  ctx.beginPath();
  ctx.arc(pivotX, pivotY, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(196, 181, 253, 0.5)';
  ctx.fill();

  // Bob outer glow
  const bobGlow2 = ctx.createRadialGradient(bobX, bobY, 0, bobX, bobY, 35);
  bobGlow2.addColorStop(0, 'rgba(167, 139, 250, 0.15)');
  bobGlow2.addColorStop(0.5, 'rgba(139, 92, 246, 0.05)');
  bobGlow2.addColorStop(1, 'rgba(139, 92, 246, 0)');
  ctx.beginPath();
  ctx.arc(bobX, bobY, 35, 0, Math.PI * 2);
  ctx.fillStyle = bobGlow2;
  ctx.fill();

  // Bob inner glow
  const bobPulse = 0.7 + 0.3 * Math.sin(time * 3);
  const bobGlow = ctx.createRadialGradient(bobX, bobY, 0, bobX, bobY, 14);
  bobGlow.addColorStop(0, `rgba(232, 224, 255, ${0.5 * bobPulse})`);
  bobGlow.addColorStop(0.4, `rgba(167, 139, 250, ${0.35 * bobPulse})`);
  bobGlow.addColorStop(1, 'rgba(139, 92, 246, 0)');
  ctx.beginPath();
  ctx.arc(bobX, bobY, 14, 0, Math.PI * 2);
  ctx.fillStyle = bobGlow;
  ctx.fill();

  // Bob core
  ctx.beginPath();
  ctx.arc(bobX, bobY, 5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(232, 224, 255, ${0.6 * bobPulse})`;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(bobX, bobY, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255, 255, 255, ${0.5 * bobPulse})`;
  ctx.fill();
}

function animate(t) {
  smoothMX += (mouseX - smoothMX) * 0.05;
  smoothMY += (mouseY - smoothMY) * 0.05;
  const w = W(), h = H();
  ctx.clearRect(0, 0, w, h);
  drawBackground(t);
  drawStars(t);
  drawPendulum(t);
  drawMouseGlow();
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
