<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Theme - Rising Steam</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0c0806; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, time = 0;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Mouse tracking
let mouseX = -1000, mouseY = -1000;
let smoothMX = -1000, smoothMY = -1000;
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('mouseleave', () => { mouseX = -1000; mouseY = -1000; });

// Colors
const PRIMARY = [212, 148, 60];
const SECONDARY = [232, 170, 84];
const TERTIARY = [184, 122, 46];
const BRIGHT = [255, 240, 212];
const CREAM = [240, 228, 212];

function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpColor(c1, c2, t) { return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)]; }

// Stars
class Star {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 1.8 + 0.3;
        this.twinkleSpeed = Math.random() * 2 + 1;
        this.twinkleOffset = Math.random() * Math.PI * 2;
        this.color = [PRIMARY, SECONDARY, TERTIARY, BRIGHT][Math.floor(Math.random() * 4)];
        this.baseAlpha = Math.random() * 0.4 + 0.1;
    }
    draw(t) {
        let sx = this.x, sy = this.y;
        const dxm = sx - smoothMX, dym = sy - smoothMY;
        const distM = Math.sqrt(dxm * dxm + dym * dym);
        let alphaBoost = 0;
        if (distM < 150) {
            const push = (150 - distM) * 0.15;
            const angle = Math.atan2(dym, dxm);
            sx += Math.cos(angle) * push;
            sy += Math.sin(angle) * push;
            alphaBoost = 0.15;
        }
        const alpha = Math.min(1, this.baseAlpha * (0.5 + 0.5 * Math.sin(t * this.twinkleSpeed + this.twinkleOffset)) + alphaBoost);
        ctx.beginPath();
        ctx.arc(sx, sy, this.size, 0, Math.PI * 2);
        ctx.fillStyle = rgba(this.color, alpha);
        ctx.fill();
        this._drawX = sx; this._drawY = sy;
    }
}

// Steam particle
class SteamParticle {
    constructor(streamIndex, totalStreams) {
        this.streamIndex = streamIndex;
        this.totalStreams = totalStreams;
        this.reset();
    }
    reset() {
        const cupTop = H * 0.72;
        const cx = W * 0.5;
        const spread = W * 0.06;
        const streamOffset = (this.streamIndex / this.totalStreams - 0.5) * spread * 2;
        this.x = cx + streamOffset + (Math.random() - 0.5) * 10;
        this.y = cupTop - Math.random() * 20;
        this.baseX = this.x;
        this.life = 0;
        this.maxLife = Math.random() * 200 + 150;
        this.speed = Math.random() * 0.8 + 0.4;
        this.amplitude = Math.random() * 30 + 15;
        this.frequency = Math.random() * 0.015 + 0.008;
        this.phaseOffset = Math.random() * Math.PI * 2;
        this.size = Math.random() * 4 + 2;
        this.color = Math.random() < 0.5 ? PRIMARY : SECONDARY;
        if (Math.random() < 0.2) this.color = BRIGHT;
    }
    update() {
        this.life++;
        if (this.life > this.maxLife) { this.reset(); return; }
        this.y -= this.speed;
        const progress = this.life / this.maxLife;
        this.x = this.baseX + Math.sin(this.life * this.frequency + this.phaseOffset) * this.amplitude * (1 + progress);
        // Drift baseX slightly
        this.baseX += (Math.random() - 0.5) * 0.3;
    }
    draw() {
        const progress = this.life / this.maxLife;
        let alpha = 1;
        if (progress < 0.1) alpha = progress / 0.1;
        else if (progress > 0.6) alpha = 1 - (progress - 0.6) / 0.4;
        alpha *= 0.5;
        const size = this.size * (1 + progress * 2);
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, size);
        grad.addColorStop(0, rgba(this.color, alpha * 0.8));
        grad.addColorStop(0.5, rgba(this.color, alpha * 0.3));
        grad.addColorStop(1, rgba(this.color, 0));
        ctx.beginPath();
        ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
    }
}

// Coffee bean
class CoffeeBean {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 6 + 3;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.005;
        this.vx = (Math.random() - 0.5) * 0.15;
        this.vy = (Math.random() - 0.5) * 0.15;
        this.alpha = Math.random() * 0.2 + 0.05;
        this.color = Math.random() < 0.5 ? TERTIARY : PRIMARY;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotSpeed;
        if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) this.reset();
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = rgba(this.color, this.alpha);
        // Bean shape: two overlapping ellipses with a center line
        ctx.beginPath();
        ctx.ellipse(-this.size * 0.15, 0, this.size * 0.45, this.size * 0.8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(this.size * 0.15, 0, this.size * 0.45, this.size * 0.8, 0, 0, Math.PI * 2);
        ctx.fill();
        // Center line
        ctx.strokeStyle = rgba([12, 8, 6], this.alpha * 1.5);
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(0, -this.size * 0.6);
        ctx.bezierCurveTo(-this.size * 0.15, -this.size * 0.2, this.size * 0.15, this.size * 0.2, 0, this.size * 0.6);
        ctx.stroke();
        ctx.restore();
    }
}

// Init
const stars = Array.from({length: 120}, () => new Star());
const steamParticles = [];
const numStreams = 5;
for (let s = 0; s < numStreams; s++) {
    for (let i = 0; i < 30; i++) {
        const p = new SteamParticle(s, numStreams);
        p.life = Math.floor(Math.random() * p.maxLife);
        steamParticles.push(p);
    }
}
const beans = Array.from({length: 18}, () => new CoffeeBean());

function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0c0806');
    grad.addColorStop(1, '#14100a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
}

function drawCup() {
    const cx = W * 0.5;
    const cupTop = H * 0.73;
    const cupBottom = H * 0.92;
    const cupWidth = W * 0.1;
    const cupWidthBottom = W * 0.08;

    ctx.save();
    // Cup body
    ctx.beginPath();
    ctx.moveTo(cx - cupWidth, cupTop);
    ctx.lineTo(cx - cupWidthBottom, cupBottom);
    ctx.quadraticCurveTo(cx, cupBottom + 10, cx + cupWidthBottom, cupBottom);
    ctx.lineTo(cx + cupWidth, cupTop);
    ctx.closePath();
    ctx.fillStyle = 'rgba(18, 14, 10, 0.9)';
    ctx.fill();
    ctx.strokeStyle = rgba(TERTIARY, 0.3);
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Cup rim
    ctx.beginPath();
    ctx.ellipse(cx, cupTop, cupWidth, 6, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(25, 20, 14, 0.9)';
    ctx.fill();
    ctx.strokeStyle = rgba(PRIMARY, 0.4);
    ctx.lineWidth = 1;
    ctx.stroke();

    // Handle
    ctx.beginPath();
    ctx.ellipse(cx + cupWidth + 14, cupTop + (cupBottom - cupTop) * 0.35, 14, 22, 0, -Math.PI * 0.4, Math.PI * 0.5);
    ctx.strokeStyle = rgba(TERTIARY, 0.3);
    ctx.lineWidth = 3;
    ctx.stroke();

    // Saucer
    ctx.beginPath();
    ctx.ellipse(cx, cupBottom + 5, cupWidth * 1.4, 7, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(18, 14, 10, 0.8)';
    ctx.fill();
    ctx.strokeStyle = rgba(TERTIARY, 0.2);
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.restore();
}

function drawCenterGlow() {
    const cx = W * 0.5;
    const cy = H * 0.32;
    // Warm glow behind steam area
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, H * 0.25);
    grad.addColorStop(0, rgba(PRIMARY, 0.06));
    grad.addColorStop(0.5, rgba(TERTIARY, 0.03));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
}

function drawConstellations() {
    if (smoothMX < -500) return;
    ctx.strokeStyle = rgba(PRIMARY, 0.12);
    ctx.lineWidth = 0.5;
    for (let i = 0; i < stars.length; i++) {
        const si = stars[i];
        if (!si._drawX) continue;
        const dxi = si._drawX - smoothMX, dyi = si._drawY - smoothMY;
        if (dxi * dxi + dyi * dyi > 120 * 120) continue;
        for (let j = i + 1; j < stars.length; j++) {
            const sj = stars[j];
            if (!sj._drawX) continue;
            const dxj = sj._drawX - smoothMX, dyj = sj._drawY - smoothMY;
            if (dxj * dxj + dyj * dyj > 120 * 120) continue;
            const ddx = si._drawX - sj._drawX, ddy = si._drawY - sj._drawY;
            if (ddx * ddx + ddy * ddy < 100 * 100) {
                ctx.beginPath();
                ctx.moveTo(si._drawX, si._drawY);
                ctx.lineTo(sj._drawX, sj._drawY);
                ctx.stroke();
            }
        }
    }
}

function drawMouseGlow() {
    if (smoothMX > -500) {
        const glow = ctx.createRadialGradient(smoothMX, smoothMY, 0, smoothMX, smoothMY, 30);
        glow.addColorStop(0, rgba(PRIMARY, 0.05));
        glow.addColorStop(1, rgba(PRIMARY, 0));
        ctx.beginPath();
        ctx.arc(smoothMX, smoothMY, 30, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
    }
}

function animate() {
    time += 0.016;
    smoothMX += (mouseX - smoothMX) * 0.05;
    smoothMY += (mouseY - smoothMY) * 0.05;
    drawBackground();

    // Stars
    for (const s of stars) s.draw(time);
    drawConstellations();

    // Beans
    for (const b of beans) { b.update(); b.draw(); }

    // Center glow
    drawCenterGlow();

    // Cup (behind steam) - with parallax
    const ppx = smoothMX > -500 ? (smoothMX / W - 0.5) * 15 : 0;
    const ppy = smoothMX > -500 ? (smoothMY / H - 0.5) * 10 : 0;
    ctx.save();
    ctx.translate(ppx, ppy);
    drawCup();
    ctx.restore();

    // Steam particles (drawn last, on top)
    for (const p of steamParticles) { p.update(); p.draw(); }

    // Extra center glow on top
    const cx = W * 0.5;
    const cy = H * 0.31;
    const pulse = 0.7 + 0.3 * Math.sin(time * 1.5);
    const grad2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
    grad2.addColorStop(0, rgba(BRIGHT, 0.04 * pulse));
    grad2.addColorStop(1, 'transparent');
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.arc(cx, cy, 60, 0, Math.PI * 2);
    ctx.fill();

    drawMouseGlow();

    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
